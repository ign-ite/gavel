<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
  <style>
    .chat-container { max-width: 900px; margin: 0 auto; }

    .chat-header {
      background: var(--bg-raised); border: 1px solid var(--border-light);
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
      padding: var(--space-5) var(--space-6); display: flex;
      align-items: center; justify-content: space-between; gap: var(--space-4); flex-wrap: wrap;
    }
    .chat-header h2 { font-size: var(--text-lg); margin: 0; }
    .chat-header-sub { color: var(--text-secondary); font-size: var(--text-sm); margin-top: 2px; }

    .chat-with-badge {
      display: flex; align-items: center; gap: var(--space-3);
      background: var(--sand); border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-4); font-weight: 600; font-size: var(--text-sm);
    }
    .chat-with-avatar {
      width: 32px; height: 32px; border-radius: var(--radius-full);
      background: var(--olive); color: var(--parchment);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: var(--text-sm);
    }

    .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--stone); display: inline-block; }
    .conn-dot.online { background: var(--sage); box-shadow: 0 0 6px rgba(143,170,126,0.5); }
    .conn-dot.offline { background: var(--ember); }

    .chat-window {
      background: var(--bg); border-left: 1px solid var(--border-light); border-right: 1px solid var(--border-light);
      height: 60vh; min-height: 400px; overflow-y: auto; padding: var(--space-5);
      display: flex; flex-direction: column; gap: var(--space-3); scroll-behavior: smooth;
    }
    .chat-window::-webkit-scrollbar { width: 6px; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 3px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }

    .msg-row { display: flex; flex-direction: column; max-width: min(75%, 520px); }
    .msg-row.mine { align-self: flex-end; align-items: flex-end; }
    .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: var(--space-3) var(--space-4); border-radius: var(--radius-xl);
      font-size: var(--text-sm); line-height: 1.6; word-break: break-word;
    }
    .msg-row.mine .msg-bubble { background: var(--olive); color: var(--parchment); border-bottom-right-radius: var(--radius-sm); }
    .msg-row.theirs .msg-bubble { background: var(--bg-raised); border: 1px solid var(--border-light); border-bottom-left-radius: var(--radius-sm); }

    .msg-meta { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; padding: 0 var(--space-1); }

    .date-divider { text-align: center; font-size: var(--text-xs); color: var(--text-muted); margin: var(--space-4) 0; position: relative; }
    .date-divider::before, .date-divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: var(--border-light); }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    .chat-input-bar {
      background: var(--bg-raised); border: 1px solid var(--border-light); border-top: none;
      border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
      padding: var(--space-4) var(--space-5); display: flex; gap: var(--space-3); align-items: flex-end;
    }
    .chat-input-bar textarea {
      flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4); font-family: var(--font-body); font-size: var(--text-sm);
      background: var(--bg); color: var(--text-primary); resize: none; outline: none;
      max-height: 120px; line-height: 1.5; transition: border-color var(--transition);
    }
    .chat-input-bar textarea:focus { border-color: var(--olive); box-shadow: 0 0 0 3px var(--sage-light); }

    .send-btn {
      width: 44px; height: 44px; background: var(--olive); color: var(--parchment);
      border: none; border-radius: var(--radius-lg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition); flex-shrink: 0;
    }
    .send-btn:hover { background: var(--olive-dark); }

    .access-denied { text-align: center; padding: var(--space-16) var(--space-6); }
    .access-denied h2 { color: var(--text-secondary); margin-bottom: var(--space-4); }

    @media (max-width: 768px) {
      .chat-header { flex-direction: column; align-items: flex-start; }
      .chat-window { height: 45vh; }
      .msg-row { max-width: 90%; }
    }
  </style>
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html">Live Auctions</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="chats.html" class="btn btn-ghost btn-sm">Messages</a>
      <a href="dashboard.html" class="btn btn-primary btn-sm" id="dashboardBtn">Dashboard</a>
    </div>
  </div></nav>

  <section style="padding:var(--space-6) var(--space-6) var(--space-16);">
    <div class="chat-container">
      <div id="chatUI" style="display:none;">
        <div class="chat-header">
          <div>
            <h2 id="chatTitle">Loading…</h2>
            <div class="chat-header-sub" id="chatSub">Private conversation</div>
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;">
            <div class="chat-with-badge">
              <div class="chat-with-avatar" id="otherAvatar">?</div>
              <span id="otherName">…</span>
            </div>
            <span class="conn-dot" id="connDot"></span>
          </div>
        </div>

        <div class="chat-window" id="chatWindow">
          <div class="empty-state" style="flex:1;display:flex;align-items:center;justify-content:center;">
            <p style="color:var(--text-muted);">This conversation opens after a valid product interaction.</p>
          </div>
        </div>

        <div class="chat-input-bar">
          <textarea id="msgInput" rows="1" placeholder="Type a message…" maxlength="2000"></textarea>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>

      <div id="accessError" class="access-denied" style="display:none;">
        <h2>Access Restricted</h2>
        <p id="accessErrorMsg" style="color:var(--text-muted);">You do not have access to this channel.</p>
        <a href="/chats.html" class="btn btn-primary" style="margin-top:var(--space-4);">Back to Messages</a>
      </div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let chatData = null;
    let myEmail = null;
    let ws = null;
    let lastDateLabel = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.isLoggedIn()) { window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}`; return; }
      window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 20));

      const params = new URLSearchParams(window.location.search);
      const auctionId = params.get('auction');
      const otherEmailParam = params.get('with');

      if (!auctionId) { showError('No auction specified.'); return; }

      const me = await api.get('/me');
      if (!me?.loggedIn) { window.location.href = '/login.html'; return; }
      myEmail = me.user.email;

      const suffix = otherEmailParam ? `?with=${encodeURIComponent(otherEmailParam)}` : '';
      const res = await api.get('/chat/' + auctionId + suffix);
      if (!res || res.message) { showError(res?.message || 'Access denied.'); return; }

      chatData = res;
      document.getElementById('chatUI').style.display = 'block';
      document.getElementById('chatTitle').textContent = chatData.auctionTitle;
      document.getElementById('chatSub').textContent = `Conversation with ${chatData.otherName || 'counterparty'}`;
      document.getElementById('otherName').textContent = chatData.otherName || 'Unknown';
      document.getElementById('otherAvatar').textContent = (chatData.otherName || '?').charAt(0).toUpperCase();

      renderMessages(chatData.messages || []);
      connectWS(auctionId);

      const input = document.getElementById('msgInput');
      const sendBtn = document.getElementById('sendBtn');

      function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        input.style.height = 'auto';

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'chat_msg', auctionId, text, recipientEmail: chatData.otherEmail }));
        } else {
          api.post('/chat/' + auctionId, { message: text, recipientEmail: chatData.otherEmail }).then(r => {
            if (r?.message) appendMsg({ senderEmail: myEmail, senderName: 'You', message: r.message.message || text, sentAt: r.message.sentAt || new Date().toISOString() });
          });
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
      input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
    });

    function connectWS(auctionId) {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws`);
      const dot = document.getElementById('connDot');

      ws.addEventListener('open', () => {
        dot.className = 'conn-dot online';
        ws.send(JSON.stringify({ type: 'join_chat', conversationKey: chatData.conversationKey, email: myEmail, name: chatData.otherName }));
      });
      ws.addEventListener('close', () => { dot.className = 'conn-dot offline'; });
      ws.addEventListener('message', (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'chat_msg' && msg.conversationKey === chatData.conversationKey) appendMsg(msg);
      });
    }

    function renderMessages(messages) {
      const win = document.getElementById('chatWindow');
      if (!messages.length) return;
      win.innerHTML = '';
      lastDateLabel = null;
      messages.forEach(m => appendMsg(m, false));
      scrollToBottom();
    }

    function appendMsg(msg, scroll = true) {
      const win = document.getElementById('chatWindow');
      const empty = win.querySelector('.empty-state');
      if (empty) empty.remove();

      const dateLabel = new Date(msg.sentAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
      if (dateLabel !== lastDateLabel) {
        lastDateLabel = dateLabel;
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.textContent = dateLabel;
        win.appendChild(div);
      }

      const isMine = msg.senderEmail === myEmail;
      const row = document.createElement('div');
      row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;
      const time = new Date(msg.sentAt).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      row.innerHTML = `<div class="msg-bubble">${esc(msg.message || msg.text || '')}</div><div class="msg-meta">${isMine ? 'You' : esc(msg.senderName || 'Unknown')} · ${time}</div>`;
      win.appendChild(row);
      if (scroll) scrollToBottom();
    }

    function scrollToBottom() { const w = document.getElementById('chatWindow'); w.scrollTop = w.scrollHeight; }

    function showError(msg) {
      document.getElementById('accessError').style.display = 'block';
      document.getElementById('accessErrorMsg').textContent = msg;
    }

    function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  </script>
</body>
</html>
