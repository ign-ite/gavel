<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Markets | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <!-- Populated by nav.js -->
            </ul>
        </nav>
    </header>

    <section class="auctions-section">
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px;">Live Auctions</h1>
        <p style="color: var(--text-secondary); margin-bottom: 40px;">Browse live listings submitted by sellers and approved on the platform.</p>
        
        <!-- View Controls & Filter Bar -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px; flex-wrap:wrap; gap:15px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <input type="text" id="market-search" placeholder="Search markets..." 
                       style="padding:10px 15px; border-radius:8px; border:1px solid var(--border-color); background:var(--glass-bg); color:var(--text-primary); width:250px;">
                
                <select id="market-filter" style="padding:10px 15px; border-radius:8px; border:1px solid var(--border-color); background:var(--glass-bg); color:var(--text-primary); cursor:pointer;">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Vehicles">Vehicles</option>
                    <option value="Real Estate">Real Estate</option>
                    <option value="Collectibles">Collectibles</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Art">Art</option>
                    <option value="Jewellery">Jewellery</option>
                    <option value="Antiques">Antiques</option>
                </select>

                <select id="sort-filter" style="padding:10px 15px; border-radius:8px; border:1px solid var(--border-color); background:var(--glass-bg); color:var(--text-primary); cursor:pointer;">
                    <option value="ending_soon">Sort by: Ending Soon</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                </select>

                <button id="market-search-btn" class="btn-primary" type="button" style="padding:10px 18px;">
                    Search
                </button>
            </div>

            <!-- Layout Toggle Buttons -->
            <div style="display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:8px; padding:4px;">
                <button id="toggle-masonry" onclick="setLayout('masonry')" title="Pinterest view"
                    style="width:36px; height:36px; border:none; border-radius:6px; cursor:pointer; background:var(--accent-blue); display:flex; align-items:center; justify-content:center; transition:background 0.2s;">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="white">
                        <rect x="1" y="1" width="7" height="5" rx="1.5"/>
                        <rect x="1" y="8" width="7" height="9" rx="1.5"/>
                        <rect x="10" y="1" width="7" height="9" rx="1.5"/>
                        <rect x="10" y="12" width="7" height="5" rx="1.5"/>
                    </svg>
                </button>
                <button id="toggle-row" onclick="setLayout('row')" title="List view"
                    style="width:36px; height:36px; border:none; border-radius:6px; cursor:pointer; background:transparent; display:flex; align-items:center; justify-content:center; transition:background 0.2s;">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="var(--text-secondary)">
                        <rect x="1" y="1"  width="5" height="5"  rx="1.5"/>
                        <rect x="8" y="2"  width="9" height="1.5" rx="0.75"/>
                        <rect x="8" y="5"  width="6" height="1.5" rx="0.75"/>
                        <rect x="1" y="8"  width="5" height="5"  rx="1.5"/>
                        <rect x="8" y="9"  width="9" height="1.5" rx="0.75"/>
                        <rect x="8" y="12" width="6" height="1.5" rx="0.75"/>
                        <rect x="1" y="15" width="5" height="2"  rx="1"/>
                        <rect x="8" y="15" width="7" height="1.5" rx="0.75"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="masonry-grid" id="auction-grid">
            <!-- Populated by main.js -->
        </div>
    </section>

    <!-- detail panel overlay -->
    <div id="detail-overlay" onclick="closeDetail(event)"></div>
    <div id="detail-panel">
        <div id="detail-content" style="padding:0 0 60px;"></div>
    </div>

    <footer>
        <p>&copy; 2026 Gavel Protocol. All rights reserved.</p>
    </footer>

    <script src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
