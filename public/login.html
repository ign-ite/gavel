<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gavel Auction House</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto&display=swap" rel="stylesheet">
    <style>
        /* Specific styles for the Login Page layout */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 40px 20px;
        }

        .login-card {
            background: #fdf5e6; /* Parchment color */
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 50px rgba(139, 111, 91, 0.1);
            border: 2px solid #d4af37; /* Brass border */
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Montserrat', sans-serif;
            color: #3d2b1f;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5c4033;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #c4b4a5;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.7);
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            background: #fff;
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border: none;
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #5c4033;
        }

        .auth-footer a {
            color: #b8860b;
            text-decoration: none;
            font-weight: bold;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="auction.html">Auctions</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Sign In</h2>
            <form action="/api/login" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary login-btn">Enter the House</button>
            </form>
            
            <div class="auth-footer">
                <p>New to the auction? <a href="signup.html">Join Gavel</a></p>
                <p><a href="#">Forgot your password?</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel. All rights reserved.</p>
    </footer>
</body>
</html>
