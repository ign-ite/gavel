<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 50px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 40px;
        }
        
        .profile-sidebar {
            background: var(--bg-card);
            padding: 30px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .profile-pic {
            width: 100px;
            height: 100px;
            background: var(--accent-blue);
            color: var(--bg-main);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        
        .stat-card h4 {
            margin: 0 0 10px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card p {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .activity-log h3 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 24px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .activity-item {
            background: var(--bg-card);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .activity-item:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .activity-item.won {
            border-color: rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.03);
        }
        
        .activity-item-left .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .activity-item-left .time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .activity-item-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        
        .activity-item-right .amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--neon-green);
        }
        
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            margin-left: 10px;
            vertical-align: middle;
            text-transform: uppercase;
        }
        
        .status-won { background: rgba(0,255,136,0.1); color: var(--neon-green); border: 1px solid rgba(0,255,136,0.2); }
        .status-closed { background: var(--glass-bg); color: var(--text-secondary); border: 1px solid var(--border-color); }
        
        @media (max-width: 900px) {
            .profile-container { grid-template-columns: 1fr; padding: 0 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-sidebar { position: static; }
        }
        body { display: none; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links"><!-- Populated by nav.js --></ul>
        </nav>
    </header>

    <div class="profile-container">
        <aside class="profile-sidebar">
            <div class="profile-pic" id="user-initial">?</div>
            <h2 id="user-name" style="margin-bottom: 5px; font-size: 1.4rem;">Loading...</h2>
            <p id="user-role" style="color:var(--accent-blue); font-size: 0.9rem; text-transform:uppercase; font-weight:600; letter-spacing:0.5px; margin-bottom:25px;">—</p>
            
            <div style="text-align:left; border-top: 1px solid var(--border-color); padding-top:20px; color:var(--text-secondary); font-size:0.9rem;">
                <p style="margin-bottom: 10px;"><strong style="color:var(--text-primary);">Email:</strong> <br><span id="user-email">—</span></p>
                <p><strong style="color:var(--text-primary);">Joined:</strong> <br><span id="user-since">—</span></p>
            </div>
            
            <div style="margin-top:20px; padding:15px; background:var(--glass-bg); border-radius:8px; border:1px solid var(--border-color); text-align:center;">
                <p style="margin:0 0 10px 0; color:var(--text-secondary); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.5px;">Wallet Balance</p>
                <p id="wallet-balance-display" style="margin:0 0 15px 0; font-size:1.8rem; font-weight:800; color:var(--neon-green);">₹0</p>
                <button id="deposit-btn" class="btn-primary" style="width:100%; padding:10px; font-size:0.9rem; background:rgba(0,196,255,0.1); color:var(--accent-blue); border-color:rgba(0,196,255,0.3);">Deposit ₹100k</button>
            </div>
            
            <a href="/sell-product.html" class="btn-primary" style="width:100%; margin-top:15px;">
                Create Listing
            </a>
        </aside>

        <main class="profile-main">
            <div class="stats-grid">
                <div class="stat-card" style="grid-column: span 3; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h4 style="margin: 0 0 5px 0; color:var(--text-secondary); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.5px;">Trust Score</h4>
                        <p id="stat-trust-score" style="margin: 0; font-size: 2.2rem; font-weight: 800; color: var(--text-primary);">100</p>
                    </div>
                    <div style="background:rgba(0, 255, 136, 0.1); color:var(--neon-green); padding:10px 16px; border-radius:8px; font-weight:700; border:1px solid rgba(0,255,136,0.3);">
                        <span id="stat-rating-count">0</span> Ratings
                    </div>
                </div>
                <div class="stat-card"><h4>Active Positions</h4><p id="stat-bids">—</p></div>
                <div class="stat-card"><h4>Markets Won</h4><p id="stat-won">—</p></div>
                <div class="stat-card"><h4>Total Volume</h4><p id="stat-volume">—</p></div>
                <div class="stat-card"><h4>My Listings</h4><p id="stat-listings">—</p></div>
                <div class="stat-card"><h4>Closed Listings</h4><p id="stat-closed">—</p></div>
                <div class="stat-card"><h4>Total Trades</h4><p id="stat-total-bids">—</p></div>
            </div>

            <div class="activity-log">
                <h3>My Trade History</h3>
                <div id="activity-list">
                    <p style="color:var(--text-secondary);">Loading history...</p>
                </div>
            </div>
        </main>
    </div>

    <footer><p>&copy; 2026 Gavel Protocol. All rights reserved.</p></footer>

    <script src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        let currentUser = null;
        try {
            const meRes = await fetch('/api/me');
            const meData = await meRes.json();
            if (!meData.loggedIn) { window.location.href = '/login.html'; return; }
            currentUser = meData.user;
            document.body.style.display = 'block';
        } catch(e) { window.location.href = '/login.html'; return; }

        try {
            const res = await fetch('/api/profile');
            const profile = await res.json();

            document.getElementById('user-initial').textContent = profile.fullname ? profile.fullname.charAt(0).toUpperCase() : '?';
            document.getElementById('user-name').textContent = profile.fullname || 'Platform User';
            document.getElementById('user-role').textContent = profile.role || 'Trader';
            document.getElementById('user-email').textContent = profile.email;
            
            if (profile.created_at) {
                document.getElementById('user-since').textContent = new Date(profile.created_at).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
            }

            document.getElementById('wallet-balance-display').textContent = '₹' + (profile.walletBalance || 0).toLocaleString('en-IN');

            document.getElementById('stat-trust-score').textContent = profile.trust_score !== undefined ? profile.trust_score : 100;
            document.getElementById('stat-rating-count').textContent = profile.ratings_count || '0';
            
            document.getElementById('stat-bids').textContent = profile.activeBids || '0';
            document.getElementById('stat-won').textContent = profile.auctionsWon || '0';
            document.getElementById('stat-listings').textContent = profile.activeListings || '0';
            document.getElementById('stat-total-bids').textContent = profile.totalBids || '0';
            document.getElementById('stat-closed').textContent = profile.closedListings || '0';
            document.getElementById('stat-volume').textContent = '₹' + (profile.totalVolume || 0).toLocaleString('en-IN');

            document.getElementById('deposit-btn').addEventListener('click', async () => {
                const btn = document.getElementById('deposit-btn');
                btn.disabled = true;
                btn.textContent = 'Processing...';
                try {
                    const dRes = await fetch('/api/deposit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: 100000 })
                    });
                    const dData = await dRes.json();
                    if(dRes.ok) {
                        document.getElementById('wallet-balance-display').textContent = '₹' + dData.newBalance.toLocaleString('en-IN');
                        btn.textContent = 'Deposited!';
                        setTimeout(() => { btn.textContent = 'Deposit ₹100k'; btn.disabled = false; }, 2000);
                    } else {
                        alert(dData.error || 'Failed to deposit');
                        btn.disabled = false;
                        btn.textContent = 'Deposit ₹100k';
                    }
                } catch(e) {
                    btn.disabled = false;
                    btn.textContent = 'Deposit ₹100k';
                }
            });
        } catch(e) {}

        try {
            const res = await fetch('/api/my-bids');
            const bids = await res.json();
            const listEl = document.getElementById('activity-list');

            if (!bids || !bids.length) {
                listEl.innerHTML = '<p style="color:var(--text-secondary); border:1px dashed var(--border-color); padding: 30px; text-align:center; border-radius:12px;">No trades executed yet. <a href="/auction.html" style="color:var(--accent-blue);">Explore Markets</a></p>';
                return;
            }

            const myEmail = currentUser.email;

            listEl.innerHTML = bids.map(b => {
                const isClosed = b.auctionStatus === 'closed';
                const isWinner = isClosed && b.winner_email === myEmail;
                const isOutbid = !isClosed && Number(b.amount) < Number(b.currentBid);

                let statusTag = '';
                if (isClosed) {
                    statusTag = isWinner ? `<span class="status-badge status-won">Won</span>` : `<span class="status-badge status-closed">Closed</span>`;
                } else if (isOutbid) {
                    statusTag = `<span class="status-badge" style="background:rgba(255, 59, 48, 0.1); color:var(--neon-red); border: 1px solid rgba(255, 59, 48, 0.2);">Outbid</span>`;
                }

                const viewBtn = `<a href="/item-detail.html?id=${b.auctionId}" class="btn-primary" style="padding: 6px 14px; font-size:0.8rem; background:transparent; border-color:var(--accent-blue); color:var(--accent-blue); margin-left:10px;">View</a>`;
                const chatBtn = isWinner
                    ? `<a href="/chat.html?auction=${b.auctionId}" class="btn-primary" style="padding: 6px 14px; font-size:0.8rem; margin-left:10px;">Chat with Seller</a>`
                    : '';

                return `
                    <div class="activity-item ${isWinner ? 'won' : ''}">
                        <div class="activity-item-left">
                            <div class="title">${b.auctionTitle}${statusTag}</div>
                            <div class="time">${new Date(b.placed_at || b.placedAt).toLocaleString('en-IN')}</div>
                        </div>
                        <div class="activity-item-right">
                            <div class="amount">₹${Number(b.amount).toLocaleString('en-IN')}</div>
                            <div class="actions">
                                ${viewBtn}
                                ${chatBtn}
                            </div>
                        </div>
                    </div>`;
            }).join('');

        } catch(e) {}
    });
    </script>
</body>
</html>
