<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Auctions — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html" style="color:var(--olive);background:rgba(92,107,79,0.08);border-radius:var(--radius-full);padding:var(--space-2) var(--space-4);">Live Auctions</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="search-bar" style="flex:1;max-width:320px;margin:0 var(--space-4);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ink-muted);flex-shrink:0;margin-left:4px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search auctions..." id="searchInput">
      <button onclick="doSearch()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
    </div>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-ghost btn-sm" id="loginBtn">Log in</a>
      <a href="signup.html" class="btn btn-primary btn-sm" id="signupBtn">Get Started</a>
      <a href="dashboard.html" class="btn btn-primary btn-sm hide" id="dashboardBtn">Dashboard</a>
    </div>
  </div></nav>

  <section style="padding:var(--space-8) 0; background:var(--bg);">
    <div class="container">
      <div class="flex-between" style="margin-bottom:var(--space-6);">
        <h1 style="font-size:var(--text-3xl);">Live Auctions</h1>
        <div style="display:flex;gap:var(--space-2);">
          <button class="btn btn-sm" id="gridBtn" onclick="setLayout('grid')" style="background:var(--sage-light);color:var(--olive);">Grid</button>
          <button class="btn btn-sm btn-ghost" id="listBtn" onclick="setLayout('list')">List</button>
        </div>
      </div>
      <div style="display:flex;gap:var(--space-3);overflow-x:auto;margin-bottom:var(--space-6);padding-bottom:var(--space-2);" id="filterBar">
        <button class="category-chip active" data-cat="all" onclick="filterCat('all')">All</button>
        <button class="category-chip" data-cat="Electronics" onclick="filterCat('Electronics')">Electronics</button>
        <button class="category-chip" data-cat="Books" onclick="filterCat('Books')">Books</button>
        <button class="category-chip" data-cat="Fashion" onclick="filterCat('Fashion')">Fashion</button>
        <button class="category-chip" data-cat="Sports" onclick="filterCat('Sports')">Sports</button>
        <button class="category-chip" data-cat="Art" onclick="filterCat('Art')">Art</button>
        <button class="category-chip" data-cat="Other" onclick="filterCat('Other')">Other</button>
      </div>
      <div class="grid grid-4" id="auctionGrid"></div>
      <div class="empty-state hide" id="emptyState"><h3>No auctions found</h3><p>Try a different category or check back later.</p></div>
    </div>
  </section>

  <footer style="border-top:1px solid var(--border-light);padding:var(--space-8) 0;background:var(--bg);margin-top:var(--space-12);">
    <div class="container flex-between" style="gap:var(--space-4);"><a href="/" class="navbar-brand">Gavel<span>.</span></a><p class="text-muted text-sm">&copy; 2026 Gavel</p></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let allAuctions=[],currentCat='all',layout=localStorage.getItem('gavel-layout')||'grid';
    const doSearch=()=>{const q=document.getElementById('searchInput').value.trim().toLowerCase();render(q)};
    document.getElementById('searchInput')?.addEventListener('input',doSearch);
    function filterCat(c){currentCat=c;document.querySelectorAll('#filterBar .category-chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));render()}
    function setLayout(l){layout=l;localStorage.setItem('gavel-layout',l);document.getElementById('gridBtn').className='btn btn-sm'+(l==='grid'?' ':' btn-ghost');document.getElementById('gridBtn').style.background=l==='grid'?'var(--sage-light)':'';document.getElementById('gridBtn').style.color=l==='grid'?'var(--olive)':'';document.getElementById('listBtn').style.background=l==='list'?'var(--sage-light)':'';document.getElementById('listBtn').style.color=l==='list'?'var(--olive)':'';render()}
    function render(search){
      let items=allAuctions;
      if(currentCat!=='all')items=items.filter(a=>a.category===currentCat);
      if(search)items=items.filter(a=>a.title.toLowerCase().includes(search)||(a.category||'').toLowerCase().includes(search));
      const grid=document.getElementById('auctionGrid'),empty=document.getElementById('emptyState');
      if(!items.length){grid.innerHTML='';empty.classList.remove('hide');return}
      empty.classList.add('hide');
      if(layout==='list'){
        grid.className='';grid.style.display='flex';grid.style.flexDirection='column';grid.style.gap='var(--space-3)';
        grid.innerHTML=items.map(a=>{const img=(a.images&&a.images[0])||'';const fb='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="90" fill="%23ebe4d6"><rect width="120" height="90"/></svg>');const u=UI.isUrgent(a.endTime);return`<a href="item-detail.html?id=${a.id}" style="display:flex;gap:var(--space-4);padding:var(--space-4);border:1px solid var(--border-light);border-radius:var(--radius-lg);background:var(--bg-raised);text-decoration:none;color:inherit;transition:box-shadow var(--transition);" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow=''">${img?`<img src="${img}" style="width:120px;height:90px;object-fit:cover;border-radius:var(--radius-md);flex-shrink:0;" onerror="this.onerror=null;this.src='${fb}';">`:`<div style="width:120px;height:90px;background:var(--sand);border-radius:var(--radius-md);flex-shrink:0;"></div>`}<div style="flex:1;min-width:0;"><h3 style="font-size:var(--text-base);font-family:var(--font-body);font-weight:600;margin-bottom:var(--space-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.title}</h3><p class="text-muted" style="font-size:var(--text-xs);margin-bottom:var(--space-2);">${a.category||'General'}</p><div class="flex-between"><span class="price price-small">${UI.formatPrice(a.currentBid)}</span><span class="${u?'timer timer-urgent':'timer'}" data-countdown="${a.endTime||''}">${UI.formatTime(a.endTime)}</span></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-2);flex-shrink:0;">${a.hasRivalry?'<span class="badge badge-rivalry">Rivalry</span>':''}${a.bidCount?`<span class="text-muted" style="font-size:var(--text-xs);">${a.bidCount} bids</span>`:''}</div></a>`}).join('');
      }else{grid.className='grid grid-4';grid.style.display='';grid.innerHTML=items.map(a=>UI.renderAuctionCard(a)).join('')}
      UI.startCountdowns();
    }
    function attachLogoBehavior() {
      const logos = document.querySelectorAll('.navbar-brand');
      const user = Auth.getUser();
      logos.forEach(logo => {
        logo.href = user ? '/dashboard-home.html' : '/';
        logo.addEventListener('click', (e) => {
          e.preventDefault();
          if (user) {
            window.location.href = '/dashboard-home.html';
          } else {
            window.location.href = '/';
          }
        });
      });
    }
    document.addEventListener('DOMContentLoaded',async()=>{
      await Auth.init();
      attachLogoBehavior();
      window.addEventListener('scroll',()=>document.getElementById('navbar')?.classList.toggle('scrolled',window.scrollY>20));
      const p=new URLSearchParams(window.location.search);if(p.get('cat')){currentCat=p.get('cat');filterCat(currentCat)}if(p.get('q'))document.getElementById('searchInput').value=p.get('q');
      const auctions=await api.get('/auctions');
      if(auctions&&auctions.length){allAuctions=auctions;render(p.get('q')?.toLowerCase())}else{document.getElementById('auctionGrid').innerHTML='<div class="empty-state"><h3>No auctions yet</h3><p>Be the first to <a href="sell-product.html">sell something</a>.</p></div>'}
      setLayout(layout);
    });
  </script>
</body>
</html>
