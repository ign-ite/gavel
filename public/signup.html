<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body style="background:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:400px; padding:var(--space-6);">
    <a href="/" style="display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-10); text-decoration:none;">
      <span class="navbar-brand" style="font-size:var(--text-xl);">Gavel<span>.</span></span>
    </a>

    <div class="animate-in">
      <h1 style="font-size:var(--text-3xl); margin-bottom:var(--space-2);">Create your account</h1>
      <p style="color:var(--text-secondary); margin-bottom:var(--space-8);">Join the student auction marketplace</p>

      <button class="btn-google" id="googleSignupBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div style="display:flex; align-items:center; gap:var(--space-4); margin:var(--space-6) 0; color:var(--ink-muted); font-size:var(--text-sm);">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span>or</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="fullname">Full Name</label>
          <input class="form-input" type="text" id="fullname" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">College Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@college.edu" required autocomplete="email">
          <p class="form-hint">Use your .edu or .ac.in email for campus verification</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="college">College <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
          <input class="form-input" type="text" id="college" placeholder="e.g. IIT Delhi">
        </div>
        <div class="form-group">
          <label class="form-label" for="phoneNumber">Phone Number</label>
          <input class="form-input" type="tel" id="phoneNumber" placeholder="Your contact number" required>
          <p class="form-hint">Saved for buyer-seller contact after a sale closes.</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Min 6 characters" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg mobile-full" style="width:100%; margin-top:var(--space-2);" id="submitBtn">Create Account</button>
      </form>

      <p style="text-align:center; margin-top:var(--space-6); color:var(--text-secondary); font-size:var(--text-sm);">
        Already have an account? <a href="login.html" style="font-weight:600;">Log in</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await Auth.init();
      if (user) { window.location.href = '/dashboard.html'; return; }

      // Google Sign-In
      const configRes = await api.get('/config');
      if (configRes?.supabaseUrl && configRes?.supabaseAnonKey) {
        document.getElementById('googleSignupBtn').addEventListener('click', () => {
          const supabaseUrl = configRes.supabaseUrl.replace(/\/$/, '');
           const redirectTo = window.location.origin + '/auth-callback.html';
           window.location.href = `${supabaseUrl}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
        });
      } else {
        document.getElementById('googleSignupBtn').style.display = 'none';
      }

      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = 'Creating account...';
        const res = await Auth.register({
          fullname: document.getElementById('fullname').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          college: document.getElementById('college').value,
          phoneNumber: document.getElementById('phoneNumber').value
        });
        if (res?.success) {
          UI.toast('Account created!', 'success');
          setTimeout(() => window.location.href = '/dashboard.html', 800);
        } else {
          UI.toast(res?.error || 'Registration failed', 'error');
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
