<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: var(--space-8);
      align-items: start;
    }

    .profile-sidebar {
      background: var(--bg-raised);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-2xl);
      padding: var(--space-8) var(--space-6);
      text-align: center;
      position: sticky;
      top: calc(var(--space-20) + var(--space-4));
    }

    .profile-avatar {
      width: 96px; height: 96px; border-radius: var(--radius-full);
      background: var(--olive); color: var(--parchment);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading); font-size: var(--text-3xl);
      margin: 0 auto var(--space-4);
    }

    .profile-name { font-family: var(--font-heading); font-size: var(--text-xl); margin-bottom: var(--space-1); }
    .profile-role { font-size: var(--text-sm); color: var(--olive); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .profile-meta { margin-top: var(--space-5); padding-top: var(--space-5); border-top: 1px solid var(--border-light); text-align: left; }
    .profile-meta-item { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-3); }
    .profile-meta-item strong { color: var(--text-primary); display: block; margin-bottom: 2px; }

    .trust-bar-wrap { margin-top: var(--space-5); padding: var(--space-4); background: rgba(143,170,126,0.06); border-radius: var(--radius-lg); border: 1px solid rgba(143,170,126,0.15); }
    .trust-bar-label { display: flex; justify-content: space-between; font-size: var(--text-sm); margin-bottom: var(--space-2); }
    .trust-bar-label span:first-child { font-weight: 600; color: var(--olive); }
    .trust-bar-label span:last-child { color: var(--text-muted); }
    .trust-bar { height: 8px; background: var(--sand); border-radius: var(--radius-full); overflow: hidden; }
    .trust-bar-fill { height: 100%; background: linear-gradient(90deg, var(--olive), var(--sage)); border-radius: var(--radius-full); transition: width 0.6s ease; }

    .wallet-mini { margin-top: var(--space-5); padding: var(--space-4); background: var(--sand); border-radius: var(--radius-lg); text-align: center; }
    .wallet-mini-label { font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .wallet-mini-value { font-family: var(--font-heading); font-size: var(--text-xl); color: var(--ink); margin: var(--space-1) 0 var(--space-3); }

    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
    .stat-card { background: var(--bg-raised); border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: var(--space-5); }
    .stat-card-label { font-size: var(--text-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-2); }
    .stat-card-value { font-family: var(--font-heading); font-size: var(--text-2xl); color: var(--ink); }

    .bid-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-5); border-radius: var(--radius-lg);
      background: var(--bg-raised); border: 1px solid var(--border-light);
      gap: var(--space-4); transition: all var(--transition);
    }
    .bid-item:hover { box-shadow: var(--shadow-sm); }
    .bid-item-left { min-width: 0; flex: 1; }
    .bid-item-title { font-size: var(--text-sm); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bid-item-title a { color: var(--text-primary); }
    .bid-item-time { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }
    .bid-item-amount { font-family: var(--font-heading); font-size: var(--text-lg); white-space: nowrap; }

    @media (max-width: 768px) {
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html">Live Auctions</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="dashboard.html" class="btn btn-primary btn-sm" id="dashboardBtn">Dashboard</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" onclick="Auth.logout()" style="display:none;">Log out</button>
    </div>
  </div></nav>

  <section style="padding:var(--space-8) 0 var(--space-16);">
    <div class="container">
      <div id="profileContent"><div class="flex-center" style="padding:2rem;"><div class="spinner"></div></div></div>
    </div>
  </section>

  <footer style="border-top:1px solid var(--border-light);padding:var(--space-8) 0;background:var(--bg);">
    <div class="container flex-between" style="gap:var(--space-4);"><a href="/" class="navbar-brand">Gavel<span>.</span></a><p class="text-muted text-sm">&copy; 2026 Gavel</p></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 20));

      const profile = await api.get('/profile');
      if (!profile || profile.error) { UI.toast('Failed to load profile', 'error'); return; }

      const bids = await api.get('/my-bids');
      renderProfile(profile, bids || []);
    });

    function renderProfile(p, bids) {
      const initials = (p.name || p.email || '?').charAt(0).toUpperCase();
      const trust = p.trustScore || 50;
      const trustPct = Math.min(100, Math.max(0, trust));
      const role = p.isSuperAdmin ? 'Super Admin' : p.isAdmin ? 'Admin' : (p.role || 'Bidder');

      let sidebar = `
        <div class="profile-sidebar reveal">
          <div class="profile-avatar">${initials}</div>
          <h2 class="profile-name">${p.name || 'User'}</h2>
          <div class="profile-role">${role}</div>
          ${p.campusVerified ? '<span class="badge badge-approved" style="margin-top:var(--space-2);">Campus Verified</span>' : ''}
          <div class="profile-meta">
            <div class="profile-meta-item"><strong>Email</strong>${p.email}</div>
            ${p.college ? `<div class="profile-meta-item"><strong>College</strong>${p.college}</div>` : ''}
            <div class="profile-meta-item"><strong>Joined</strong>${p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' }) : '—'}</div>
          </div>
          <div class="trust-bar-wrap">
            <div class="trust-bar-label"><span>Trust Score</span><span>${trust}/100</span></div>
            <div class="trust-bar"><div class="trust-bar-fill" style="width:${trustPct}%"></div></div>
          </div>
          <div class="wallet-mini">
            <div class="wallet-mini-label">Wallet Balance</div>
            <div class="wallet-mini-value">${UI.formatPrice(p.walletBalance || 0)}</div>
            <button class="btn btn-sm btn-secondary" onclick="addFunds()">Add Funds</button>
          </div>
          <a href="sell-product.html" class="btn btn-primary btn-sm" style="margin-top:var(--space-4);width:100%;">+ New Listing</a>
        </div>`;

      const st = p.stats || {};
      let main = `
        <div>
          <div class="stat-grid reveal">
            <div class="stat-card"><div class="stat-card-label">Active Listings</div><div class="stat-card-value">${st.activeListings || 0}</div></div>
            <div class="stat-card"><div class="stat-card-label">Pending Review</div><div class="stat-card-value">${st.pendingListings || 0}</div></div>
            <div class="stat-card"><div class="stat-card-label">Closed Listings</div><div class="stat-card-value">${st.closedListings || 0}</div></div>
            <div class="stat-card"><div class="stat-card-label">Active Bids</div><div class="stat-card-value">${st.activeBids || 0}</div></div>
            <div class="stat-card"><div class="stat-card-label">Auctions Won</div><div class="stat-card-value">${st.auctionsWon || 0}</div></div>
            <div class="stat-card"><div class="stat-card-label">Total Bids</div><div class="stat-card-value">${st.totalBids || 0}</div></div>
          </div>

          <div style="margin-top:var(--space-10);" class="reveal reveal-delay-1">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-5);">
              <h2 style="font-size:var(--text-2xl);">Bid History</h2>
              <a href="watchlist.html" class="btn btn-ghost btn-sm">Watchlist (${st.watchlistCount || 0})</a>
            </div>
            ${bids.length ? `<div style="display:flex;flex-direction:column;gap:var(--space-3);">${bids.map(b => {
              const isOutbid = b.auctionStatus === 'active' && b.amount < b.currentBid;
              const statusBadge = b.auctionStatus === 'closed'
                ? (b.winnerEmail === p.email ? '<span class="badge badge-approved">Won</span>' : '<span class="badge badge-closed">Closed</span>')
                : isOutbid ? '<span class="badge badge-live">Outbid</span>' : '<span class="badge badge-approved">Leading</span>';
              return `<div class="bid-item">
                <div class="bid-item-left">
                  <div class="bid-item-title"><a href="item-detail.html?id=${b.auctionId}">${b.auctionTitle}</a> ${statusBadge}</div>
                  <div class="bid-item-time">${new Date(b.placedAt).toLocaleString('en-IN')}</div>
                </div>
                <div class="bid-item-amount">${UI.formatPrice(b.amount)}</div>
              </div>`;
            }).join('')}</div>` : `<div class="empty-state"><h3>No bids yet</h3><p><a href="auction.html">Browse auctions</a></p></div>`}
          </div>
        </div>`;

      document.getElementById('profileContent').innerHTML = `<div class="profile-layout">${sidebar}${main}</div>`;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    async function addFunds() {
      const amount = prompt('Enter amount to add (₹):', '1000');
      if (!amount) return;
      const num = Number(amount);
      if (!num || num <= 0) { UI.toast('Invalid amount', 'error'); return; }
      const res = await api.post('/deposit', { amount: num });
      if (res?.success) {
        UI.toast(`₹${num.toLocaleString('en-IN')} added!`, 'success');
        document.querySelector('.wallet-mini-value').textContent = UI.formatPrice(res.newBalance);
      } else { UI.toast(res?.error || 'Deposit failed', 'error'); }
    }
  </script>
</body>
</html>
