<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links"><!-- Populated by nav.js --></ul>
        </nav>
    </header>

    <main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
        <h1 style="color: var(--text-primary); margin-bottom: 30px;">My Watchlist</h1>
        <div class="auction-cards" id="watchlist-container">
            <!-- Populated by JS -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel Protocol. All rights reserved.</p>
    </footer>
    
    <script src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('watchlist-container');
            if (!container) return;
            window.activeTimers = window.activeTimers || [];

            try {
                const res = await fetch('/api/watchlist');
                if (res.status === 401) {
                    window.location.href = '/login.html';
                    return;
                }
                const auctions = await res.json();
                
                if (!auctions || auctions.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1 / -1; padding: 60px; text-align: center; background:var(--bg-card); border-radius:12px; border:1px dashed var(--border-color);">
                            <p style="color: var(--text-secondary); margin-bottom: 20px;">Your watchlist is currently empty.</p>
                            <a href="/auction.html" class="btn-primary" style="display:inline-block; padding: 12px 24px;">Browse Markets</a>
                        </div>`;
                    return;
                }

                container.innerHTML = "";
                
                auctions.forEach(item => {
                    const div = document.createElement("div");
                    div.classList.add("auction-card");
                    div.style.background = 'var(--bg-card)';
                    div.style.border = '1px solid var(--border-color)';
                    div.style.borderRadius = '12px';
                    div.style.overflow = 'hidden';
                    div.style.display = 'flex';
                    div.style.flexDirection = 'column';
                    
                    const verificationBadge = !item.verified
                        ? `<span style="position:absolute; top:12px; right:12px; background:rgba(255, 59, 48, 0.1); color:var(--neon-red); padding:4px 8px; font-size:0.7rem; font-weight:700; border-radius:6px; border: 1px solid rgba(255, 59, 48, 0.3); z-index:5;">UNVERIFIED</span>`
                        : `<span style="position:absolute; top:12px; right:12px; background:rgba(0, 255, 136, 0.1); color:var(--neon-green); padding:4px 8px; font-size:0.7rem; font-weight:700; border-radius:6px; border: 1px solid rgba(0, 255, 136, 0.3); z-index:5;">VERIFIED</span>`;

                    let timeHtml = '';
                    if (item.status === 'active' && item.endTime) {
                        const timerId = `timer-${item.id}`;
                        window.activeTimers.push({ el: timerId, end: new Date(item.endTime).getTime() });
                        timeHtml = `
                            <div style="text-align: right;">
                                <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; display:block;">Time Left</span>
                                <span id="${timerId}" style="font-size: 0.95rem; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums;">--:--:--</span>
                            </div>`;
                    } else {
                        timeHtml = `
                            <div style="text-align: right;">
                                <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; display:block;">Status</span>
                                <span style="font-size: 0.95rem; font-weight: 600; color: var(--neon-red);">Closed</span>
                            </div>`;
                    }

                    div.innerHTML = `
                        <div style="position: relative; height: 180px;">
                            ${verificationBadge}
                            <button onclick="toggleWatchlist('${item.id}', this)" class="unwatch-btn" title="Remove from Watchlist" style="position:absolute; top:12px; left:12px; z-index:5; background:rgba(0,0,0,0.6); border:none; color:var(--accent-blue); width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.2rem; transition:transform 0.2s;">
                                ★
                            </button>
                            <img src="${item.image}" alt="${item.title}" style="width:100%; height:100%; object-fit:cover; border-bottom:1px solid var(--border-color);">
                        </div>
                        <div style="padding: 20px; display: flex; flex-direction: column; flex-grow: 1;">
                            <h3 style="margin:0 0 16px 0; font-size:1.15rem; font-weight:600; color:var(--text-primary);">${item.title}</h3>
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Top Bid</span>
                                    <span style="font-size: 1.4rem; font-weight: 800; color: var(--neon-green);">₹${item.currentBid.toLocaleString('en-IN')}</span>
                                </div>
                                ${timeHtml}
                            </div>
                            <a href="item-detail.html?id=${item.id}" class="btn-primary" style="width: 100%; text-align: center; display: block; padding: 12px; font-size: 0.95rem; font-weight: 600;">View Market</a>
                        </div>
                    `;
                    container.appendChild(div);
                });

                startTimerLoop();
            } catch(e) {
                container.innerHTML = "<p>Error loading watchlist.</p>";
            }
        });

        window.toggleWatchlist = async (id, btn) => {
            btn.style.transform = 'scale(0.8)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
            try {
                const res = await fetch('/api/watchlist/toggle', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id})
                });
                const data = await res.json();
                if (data.success && !data.added) {
                    btn.closest('.auction-card').style.display = 'none';
                    // Optional: update nav.js badge if exists
                }
            } catch(e) {}
        };

        let timerInterval;
        function startTimerLoop() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = Date.now();
                window.activeTimers.forEach(t => {
                    const el = document.getElementById(t.el);
                    if (!el) return;
                    const diff = t.end - now;
                    if (diff <= 0) {
                        el.textContent = "Ended";
                        el.style.color = "var(--neon-red)";
                    } else {
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const secs = Math.floor((diff % (1000 * 60)) / 1000);
                        
                        let timeStr = '';
                        if (days > 0) timeStr += `${days}d `;
                        timeStr += `${hours.toString().padStart(2, '0')}h ${mins.toString().padStart(2, '0')}m ${secs.toString().padStart(2, '0')}s`;
                        el.textContent = timeStr;
                    }
                });
            }, 1000);
        }
    </script>
</body>
</html>
