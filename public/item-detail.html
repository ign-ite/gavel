<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .bid-container { 
            display: flex; 
            gap: 60px; 
            padding: 80px 50px; 
            max-width: 1300px; 
            margin: 0 auto; 
            align-items: flex-start;
        }

        .item-display { flex: 1.4; position: relative; }

        .item-img { 
            width: 100%; 
            border-radius: 4px; 
            border: 12px solid var(--parchment); 
            outline: 2px solid var(--brass-gold);
            box-shadow: 25px 25px 50px rgba(0, 0, 0, 0.3);
            display: block;
        }

        .verification-label {
            display: inline-block;
            background: var(--brass-gold);
            color: var(--polished-walnut);
            padding: 5px 15px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 20px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .bid-panel { 
            background: var(--parchment); 
            padding: 40px; 
            border: 2px solid var(--brass-gold); 
            border-radius: 4px; 
            flex: 1; 
            box-shadow: 15px 15px 40px rgba(0,0,0,0.2);
            position: sticky;
            top: 120px;
        }
 
        .bid-panel h2 { 
            font-family: 'Montserrat', sans-serif;
            color: var(--deep-oak);
            font-size: 2.2rem;
            margin-top: 0;
            border-bottom: 2px solid var(--brass-gold);
            padding-bottom: 15px;
            text-transform: uppercase;
        }
 
        .price-tag { 
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem; 
            color: var(--polished-walnut); 
            font-weight: 700;
            margin: 30px 0 10px 0; 
        }
 
        .lot-number {
            color: #8b6f5b;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
 
        .bid-input-container {
            background: white;
            padding: 20px;
            border: 1px solid #c4b4a5;
            border-radius: 4px;
            margin-bottom: 20px;
        }
 
        .bid-input-container label {
            display: block;
            font-weight: bold;
            color: var(--deep-oak);
            margin-bottom: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
 
        .bid-input-container input { 
            width: 100%; 
            border: none;
            font-size: 1.5rem;
            color: var(--polished-walnut);
            font-weight: bold;
            outline: none;
        }
 
        .place-bid-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
 
        .seller-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #5c4033;
            border-top: 1px dashed #c4b4a5;
            padding-top: 20px;
        }
 
        @media (max-width: 900px) {
            .bid-container { flex-direction: column; padding: 40px 20px; }
            .bid-panel { position: static; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
          <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="auction.html">Auctions</a></li>
                <li><a href="my-products.html">My Products</a></li>
                <li class="nav-profile">
                    <a href="profile.html" class="nav-avatar-initial" id="nav-avatar">G</a>
                </li>
            </ul>
    </nav>
</header>

<main class="bid-container">
    <div class="item-display">
        <img id="display-img" class="item-img" src="" alt="Item">

        <div id="verification-section" style="display:none; margin-top:30px;">
            <span class="verification-label">360° Verification Footage</span>
            <video id="display-video" controls style="width:100%; margin-top:10px;"></video>
        </div>
    </div>

    <div class="bid-panel">
        <p class="lot-number">Live Auction • Lot #8821</p>
        <h2 id="display-title">Loading...</h2>

        <div class="price-tag">₹<span id="display-price">0</span></div>
        <p style="margin-top:-10px; font-weight:bold;">Current Highest Bid</p>

        <div class="bid-input-container">
            <label for="bid-amount">Set Your Maximum Bid</label>
            <div style="display:flex; align-items:center;">
                <span style="font-size:1.5rem; font-weight:bold; margin-right:5px;">₹</span>
                <input type="number" id="bid-amount" placeholder="Enter amount">
            </div>
        </div>

        <button class="btn-primary place-bid-btn">PLACE YOUR BID</button>

        <div class="seller-note">
            <strong>Auctioneer's Note:</strong> Verified bidders only.
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Gavel. All rights reserved.</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    const urlParams = new URLSearchParams(window.location.search);
    const itemName = urlParams.get('item');

    if (!itemName) return;

    try {
        const response = await fetch('/api/auctions');
        const auctions = await response.json();

        const itemData = auctions.find(a => a.title === decodeURIComponent(itemName));

        if (!itemData) return;

        window.currentItemId = itemData.id;

        document.getElementById('display-title').textContent = itemData.title;
        document.getElementById('display-img').src = itemData.image;
        document.getElementById('display-price').textContent =
            itemData.currentBid.toLocaleString('en-IN');

        if (itemData.verificationVideo) {
            document.getElementById('verification-section').style.display = 'block';
            document.getElementById('display-video').src = itemData.verificationVideo;
        }

    } catch (err) {
        console.error("Error loading item:", err);
    }
});


document.querySelector('.place-bid-btn').addEventListener('click', async () => {

    const bidInput = document.getElementById('bid-amount');
    const bidAmount = Number(bidInput.value);

    if (!bidAmount || bidAmount <= 0) {
        alert("Enter a valid bid amount");
        return;
    }

    try {
        const response = await fetch('/api/place-bid', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: window.currentItemId,
                bidAmount
            })
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.message);
            return;
        }

        document.getElementById('display-price').textContent =
            data.newBid.toLocaleString('en-IN');

        bidInput.value = "";
        alert("Bid placed successfully!");

    } catch (err) {
        console.error("Bid error:", err);
        alert("Failed to place bid");
    }
});
</script>

</body>
</html>
