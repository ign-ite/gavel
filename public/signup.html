<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Gavel Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-blue)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links"><!-- Populated by nav.js --></ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join the world's premier asset market</p>

            <button class="btn-google" id="google-auth-btn" type="button">
                <img src="images/google-logo.png" alt="Google Logo">
                Sign up with Google
            </button>
            <div class="auth-divider">or</div>

            <div class="error-msg" id="error-msg"
                style="display:none; color:var(--neon-red); margin-bottom:15px; text-align:center;"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" class="form-control" required
                        placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" name="role" class="form-control"
                        style="appearance: none; background: url('data:image/svg+xml;utf8,<svg fill=%22%238b949e%22 viewBox=%220 0 24 24%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>') no-repeat right 10px center; background-size: 20px;">
                        <option value="bidder">Trader (Buyer)</option>
                        <option value="auctioneer">Creator (Seller)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required
                        placeholder="Min. 8 characters" minlength="8">
                </div>
                <button type="submit" class="btn-primary btn-block">Sign Up</button>
            </form>
            <div class="auth-links">
                <p>Already a member? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel Protocol. All rights reserved.</p>
    </footer>

    <script src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>

</html>
