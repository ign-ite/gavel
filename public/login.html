<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gavel Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-blue)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links"><!-- Populated by nav.js --></ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Log In</h2>
            <p class="subtitle">Use Google as the primary sign-in method for now.</p>

            <button class="btn-google" id="google-auth-btn" type="button">
                <img src="images/google-logo.png" alt="Google Logo">
                Continue with Google
            </button>
            <button type="button" class="btn-primary btn-block" id="toggle-other-methods" style="margin-top:12px; background:transparent; color:var(--text-primary); border:1px solid var(--border-color);">
                Use other methods
            </button>

            <div class="error-msg" id="error-msg"
                style="display:none; color:var(--neon-red); margin-bottom:15px; text-align:center;"></div>

            <div id="auth-placeholder-panel" style="display:none; margin-top:18px; padding:18px; border:1px dashed var(--border-color); border-radius:12px; background:rgba(255,255,255,0.02);">
                <div class="auth-divider" style="margin-top:0;">other methods</div>
                <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:14px;">Email login is a placeholder right now. It is intentionally disabled and has no backend connection yet.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" disabled
                            placeholder="Placeholder only">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" disabled
                            placeholder="Placeholder only">
                    </div>
                    <button type="submit" class="btn-primary btn-block" id="email-login-placeholder">Log In</button>
                </form>
            </div>
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel Protocol. All rights reserved.</p>
    </footer>

    <script src="js/nav.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>

</html>
