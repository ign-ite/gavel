<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the House | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 60px 20px;
        }

        .auth-card {
            background: #fdf5e6; /* Parchment */
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 50px rgba(139, 111, 91, 0.1);
            border: 2px solid #d4af37; /* Brass */
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-card h2 {
            font-family: 'Montserrat', sans-serif;
            color: #3d2b1f;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-card p.subtitle {
            color: #8b6f5b;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #5c4033;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #c4b4a5;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.7);
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            background: #fff;
        }

        .signup-btn {
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            border: none;
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #5c4033;
        }

        .auth-footer a {
            color: #b8860b;
            text-decoration: none;
            font-weight: bold;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <img src="images/logo.png" alt="Gavel Logo" class="logo-icon">
                    <span>Gavel</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="auction.html">Auctions</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join the world's most trusted auction house.</p>
            
            <form action="/api/signup" method="POST">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" name="role">
                        <option value="bidder">Bidder (Buyer)</option>
                        <option value="auctioneer">Auctioneer (Seller)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Min. 8 characters">
                </div>

                <button type="submit" class="btn-primary signup-btn">Register Membership</button>
            </form>
            
            <div class="auth-footer">
                <p>Already a member? <a href="login.html">Sign In here</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gavel. All rights reserved.</p>
    </footer>
</body>
</html>
