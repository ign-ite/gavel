<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
  <style>
    .explore-topbar {
      position: sticky; top: calc(var(--space-20) + var(--space-4));
      z-index: 50; background: rgba(250,247,242,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
      padding: var(--space-3) 0;
    }
    .explore-topbar .container { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
    .explore-topbar .search-bar { flex: 1; min-width: 200px; max-width: 400px; }
    .explore-tab {
      padding: var(--space-2) var(--space-4); border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: 500; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--bg);
      color: var(--text-secondary); transition: all var(--transition);
      font-family: var(--font-body); white-space: nowrap;
    }
    .explore-tab:hover, .explore-tab.active {
      border-color: var(--olive); background: var(--sage-light); color: var(--olive);
    }

    /* ── UNIFORM CARD GRID ── */
    .explore-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
      padding: var(--space-6) 0 var(--space-16);
    }
    .explore-card {
      position: relative;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: var(--ink);
      cursor: pointer;
      transition: transform 250ms ease, box-shadow 250ms ease;
    }
    .explore-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(26,43,31,0.14);
    }
    .explore-card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
    }
    .explore-card-media video,
    .explore-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .explore-card-media video { pointer-events: none; }
    .explore-card-media .gradient-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--sand) 0%, var(--gold-light) 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--earth); font-family: var(--font-heading);
      font-size: var(--text-sm); padding: var(--space-4); text-align: center;
    }
    .explore-card .card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: var(--space-5) var(--space-4) var(--space-4);
      background: linear-gradient(transparent, rgba(44,36,23,0.85));
      color: var(--parchment);
    }
    .card-overlay .item-title {
      font-family: var(--font-heading);
      font-size: var(--text-base);
      line-height: 1.25;
      margin-bottom: var(--space-1);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-overlay .item-price {
      font-family: var(--font-heading);
      font-size: var(--text-lg);
      color: var(--gold-light);
      font-weight: 600;
    }
    .card-overlay .item-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-top: var(--space-2);
      font-size: var(--text-xs);
    }
    .card-overlay .item-meta .timer-pill {
      background: rgba(255,255,255,0.14);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-weight: 600;
    }
    .card-overlay .item-meta .timer-pill.urgent {
      background: rgba(196,93,62,0.7);
      animation: timerPulse 1s ease-in-out infinite;
    }
    .vo-badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 700;
    }
    .vo-badge-live {
      background: var(--ember);
      color: var(--parchment);
      box-shadow: 0 0 8px rgba(196,93,62,0.5);
    }
    .vo-badge-ending {
      background: rgba(184,134,11,0.8);
      color: var(--parchment);
    }
    .card-watch-btn {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      border: none;
      background: rgba(250,247,242,0.65);
      backdrop-filter: blur(8px);
      color: var(--ink-muted);
      cursor: pointer;
      z-index: 3;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .card-watch-btn:hover { background: rgba(250,247,242,0.9); color: var(--gold); }
    .card-watch-btn.watched { color: var(--gold); }
    .card-watch-btn svg { width: 16px; height: 16px; }

    .feed-empty {
      text-align: center;
      padding: var(--space-16) var(--space-6);
    }
    .feed-empty h3 { color: var(--text-secondary); margin-bottom: var(--space-3); }

    /* ── INFINITE SCROLL OVERLAY (TikTok/Reels) ── */
    .scroll-feed {
      position: fixed;
      inset: 0;
      z-index: 250;
      background: var(--ink);
      display: none;
    }
    .scroll-feed.open { display: flex; flex-direction: column; }
    .scroll-feed-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(rgba(44,36,23,0.6), transparent);
    }
    .scroll-feed-back {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      border: none;
      background: rgba(255,255,255,0.12);
      color: var(--parchment);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .scroll-feed-back:hover { background: rgba(255,255,255,0.2); }
    .scroll-feed-back svg { width: 20px; height: 20px; }
    .scroll-feed-counter {
      font-size: var(--text-sm);
      color: var(--parchment);
      font-weight: 600;
      opacity: 0.8;
    }
    .scroll-feed-close {
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      border: none;
      background: rgba(255,255,255,0.12);
      color: var(--parchment);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: background 0.2s;
    }
    .scroll-feed-close:hover { background: rgba(255,255,255,0.2); }

    .scroll-feed-track {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .scroll-feed-item {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(320px, 520px) minmax(320px, 420px);
      justify-content: center;
      align-items: stretch;
      gap: var(--space-6);
      padding: calc(var(--space-16) + var(--space-4)) var(--space-6) var(--space-6);
      transition: transform 300ms ease-out, opacity 300ms ease-out;
    }
    .scroll-feed-item.above { transform: translateY(-100%); opacity: 0; }
    .scroll-feed-item.current { transform: translateY(0); opacity: 1; }
    .scroll-feed-item.below { transform: translateY(100%); opacity: 0; }

    .sfi-media {
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: var(--ink);
      border-radius: var(--radius-2xl);
      min-height: 0;
      padding: var(--space-4);
    }
    .sfi-media-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    .sfi-media img,
    .sfi-media video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: var(--radius-xl);
    }
    .sfi-media video { cursor: default; }
    .sfi-media .gradient-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--sand) 0%, var(--gold-light) 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--earth); font-family: var(--font-heading);
      font-size: var(--text-2xl);
    }

    .sfi-info {
      margin-top: var(--space-4);
      color: var(--parchment);
    }
    .sfi-info .sfi-title {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      margin-bottom: var(--space-2);
      line-height: 1.2;
    }
    .sfi-info .sfi-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
      margin-bottom: var(--space-3);
    }
    .sfi-info .sfi-price {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      color: var(--gold-light);
      font-weight: 600;
    }
    .sfi-info .sfi-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }
    .sfi-info .sfi-actions .btn {
      background: var(--olive);
      color: var(--parchment);
      border: none;
    }
    .sfi-info .sfi-actions .btn:hover { background: var(--olive-dark); }

    .sfi-side {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-top: var(--space-4);
    }
    .sfi-side-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--parchment); font-size: var(--text-xs);
      cursor: pointer; background: none; border: none;
      transition: transform 0.2s;
      padding: 10px 14px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.08);
    }
    .sfi-side-btn:hover { transform: scale(1.15); }
    .sfi-side-btn svg { width: 28px; height: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
    .sfi-side-label { font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

    .sfi-panel {
      background: #12100c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-2xl);
      color: var(--parchment);
      padding: var(--space-6);
      overflow: auto;
    }
    .sfi-panel h3 { color: var(--parchment); margin-bottom: var(--space-2); }
    .sfi-specs {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-4);
    }
    .sfi-specs td {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: var(--text-sm);
      vertical-align: top;
    }
    .sfi-specs td:first-child {
      color: rgba(255,255,255,0.7);
      width: 36%;
      font-weight: 600;
    }
    .feed-chat-panel {
      position: fixed;
      top: calc(var(--space-20) + var(--space-2));
      right: var(--space-4);
      width: min(360px, calc(100vw - 24px));
      height: calc(100vh - var(--space-20) - var(--space-6));
      background: rgba(18,16,12,0.97);
      color: var(--parchment);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      z-index: 260;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .feed-chat-panel.open { display: flex; }
    .feed-chat-header,
    .feed-chat-composer {
      padding: var(--space-4);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .feed-chat-composer {
      border-bottom: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: var(--space-3);
      align-items: flex-end;
    }
    .feed-chat-body {
      flex: 1;
      overflow: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .feed-chat-bubble {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 16px;
      font-size: var(--text-sm);
      line-height: 1.5;
    }
    .feed-chat-bubble.mine {
      align-self: flex-end;
      background: var(--olive);
    }
    .feed-chat-bubble.theirs {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
    }
    .feed-chat-composer textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--parchment);
      padding: 12px 14px;
    }
    .feed-chat-composer button {
      border: none;
      border-radius: 14px;
      background: var(--olive);
      color: var(--parchment);
      padding: 12px 16px;
      cursor: pointer;
    }

    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 1023px) {
      .explore-grid { grid-template-columns: repeat(3, 1fr); }
      .scroll-feed-item {
        grid-template-columns: 1fr;
        gap: var(--space-4);
        padding: calc(var(--space-16) + var(--space-2)) var(--space-4) var(--space-4);
      }
      .sfi-panel {
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
      }
      .sfi-media {
        max-width: 640px;
        width: 100%;
        margin: 0 auto;
      }
      .feed-chat-panel {
        width: calc(100vw - 24px);
        right: 12px;
      }
    }
    @media (max-width: 767px) {
      body { padding-top: 74px !important; }
      .navbar .container {
        gap: var(--space-2);
        align-items: center;
      }
      .navbar-nav {
        order: 3;
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .navbar-actions {
        margin-left: auto;
        gap: var(--space-2);
      }
      .explore-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
      .explore-topbar {
        top: 74px;
        padding: var(--space-2) 0;
      }
      .explore-topbar .container {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--space-3);
      }
      .explore-topbar .search-bar,
      #conditionFilter,
      #saveSearchBtn {
        max-width: none;
        width: 100%;
      }
      .scroll-feed-header {
        padding: var(--space-3);
      }
      .scroll-feed-track {
        overflow-y: auto;
        scroll-snap-type: y mandatory;
      }
      .scroll-feed-item {
        position: relative;
        min-height: 100vh;
        grid-template-columns: 1fr;
        justify-items: center;
        align-content: start;
        padding: 72px 12px 24px;
        gap: 12px;
        scroll-snap-align: start;
      }
      .scroll-feed-item.above,
      .scroll-feed-item.current,
      .scroll-feed-item.below {
        transform: none;
        opacity: 1;
      }
      .sfi-media {
        width: min(100%, 460px);
        padding: 12px;
        border-radius: 24px;
      }
      .sfi-media-frame {
        min-height: 68vh;
        max-height: 72vh;
      }
      .sfi-media img,
      .sfi-media video {
        max-height: 72vh;
      }
      .sfi-info {
        margin-top: 12px;
      }
      .sfi-panel {
        width: min(100%, 460px);
        padding: var(--space-4);
      }
      .sfi-side {
        justify-content: space-between;
      }
      .sfi-side-btn {
        flex: 1;
        justify-content: center;
      }
      .feed-chat-panel {
        top: auto;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: min(52vh, 480px);
        border-radius: 24px 24px 0 0;
      }
    }
    @media (max-width: 374px) {
      .explore-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-2); }
    }
  </style>
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html">Live Auctions</a></li>
      <li><a href="explore.html" style="color:var(--olive);background:rgba(92,107,79,0.08);">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="btn btn-ghost btn-sm watchlist-trigger" data-watchlist-trigger aria-label="Watchlist" style="padding:var(--space-2);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <a href="login.html" class="btn btn-ghost btn-sm" id="loginBtn">Log in</a>
      <a href="signup.html" class="btn btn-primary btn-sm" id="signupBtn">Get Started</a>
      <a href="chats.html" class="btn btn-ghost btn-sm hide" id="messagesBtn">Messages</a>
      <a href="dashboard-home.html" class="btn btn-primary btn-sm hide" id="dashboardBtn">Dashboard</a>
    </div>
  </div></nav>

  <div class="explore-topbar">
    <div class="container">
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ink-muted);flex-shrink:0;margin-left:4px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="exploreSearch" placeholder="Search auctions...">
      </div>
      <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">
        <button class="explore-tab active" data-filter="all">All</button>
        <button class="explore-tab" data-filter="videos">Videos</button>
        <button class="explore-tab" data-filter="live">Live Now</button>
        <button class="explore-tab" data-filter="ending">Ending Soon</button>
        <button class="explore-tab" data-filter="highbids">High Stakes</button>
      </div>
      <select id="conditionFilter" class="form-select" style="max-width:180px;">
        <option value="">All Conditions</option>
        <option value="New">New</option>
        <option value="Like New">Like New</option>
        <option value="Good">Good</option>
        <option value="Fair">Fair</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="saveSearchBtn">Notify me</button>
    </div>
  </div>

  <div class="container">
    <div class="explore-grid" id="exploreGrid">
      <div class="skeleton" style="aspect-ratio:9/16;border-radius:var(--radius-xl);"></div>
      <div class="skeleton" style="aspect-ratio:9/16;border-radius:var(--radius-xl);"></div>
      <div class="skeleton" style="aspect-ratio:9/16;border-radius:var(--radius-xl);"></div>
      <div class="skeleton" style="aspect-ratio:9/16;border-radius:var(--radius-xl);"></div>
    </div>
  </div>

  <div class="scroll-feed" id="scrollFeed">
    <div class="scroll-feed-header">
      <button class="scroll-feed-back" id="feedBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
      <span class="scroll-feed-counter" id="feedCounter"></span>
      <button class="scroll-feed-close" id="feedClose">&times;</button>
    </div>
    <div class="scroll-feed-track" id="feedTrack"></div>
  </div>
  <div class="feed-chat-panel" id="feedChatPanel">
    <div class="feed-chat-header">
      <div class="text-muted text-sm" id="feedChatProduct">Product chat</div>
      <strong id="feedChatWith">Seller</strong>
    </div>
    <div class="feed-chat-body" id="feedChatBody"></div>
    <div class="feed-chat-composer">
      <textarea id="feedChatInput" rows="1" placeholder="Need more images? Ask while you keep scrolling."></textarea>
      <button type="button" id="feedChatSend">Send</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/watchlist-drawer.js"></script>
  <script src="js/site.js"></script>
  <script>
    let allAuctions = [];
    let filtered = [];
    let currentFilter = 'all';
    let searchTerm = '';
    let feedIndex = 0;
    let feedOpen = false;
    let savedScrollY = 0;
    let ws = null;
    let touchStartY = 0;
    let touchStartTime = 0;
    let wheelLocked = false;
    let activeChatAuctionId = null;
    let activeChatOtherEmail = null;
    let activeConversationKey = null;
    let myEmail = null;
    let conditionFilter = '';

    const watchlistIds = {
      get() { try { return JSON.parse(localStorage.getItem('gavel_watchlist') || '[]'); } catch { return []; } },
      add(id) { const ids = this.get(); if (!ids.includes(String(id))) { ids.push(String(id)); localStorage.setItem('gavel_watchlist', JSON.stringify(ids)); } },
      remove(id) { const ids = this.get().filter(i => i !== String(id)); localStorage.setItem('gavel_watchlist', JSON.stringify(ids)); },
      has(id) { return this.get().includes(String(id)); }
    };

    function attachLogoBehavior() {
      const logos = document.querySelectorAll('.navbar-brand');
      const user = Auth.getUser();
      logos.forEach(logo => {
        logo.href = user ? '/dashboard-home.html' : '/';
        logo.addEventListener('click', (e) => {
          e.preventDefault();
          if (user) {
            window.location.href = '/dashboard-home.html';
          } else {
            window.location.href = '/';
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      myEmail = Auth.getUser()?.email || null;
      attachLogoBehavior();
      window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 20));
      if (Auth.isLoggedIn()) {
        document.getElementById('loginBtn')?.classList.add('hide');
        document.getElementById('signupBtn')?.classList.add('hide');
        document.getElementById('messagesBtn')?.classList.remove('hide');
        document.getElementById('dashboardBtn')?.classList.remove('hide');
      }

      const res = await api.get('/auctions?lightweight=1');
      if (!res || res.error) { UI.toast('Failed to load auctions', 'error'); return; }
      allAuctions = res;

      if (Auth.isLoggedIn()) {
        const wl = await api.get('/watchlist');
        if (Array.isArray(wl)) localStorage.setItem('gavel_watchlist', JSON.stringify(wl.map(a => String(a.id))));
      }

      applyFilter();
      renderGrid();

      document.querySelectorAll('.explore-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.explore-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          applyFilter();
          renderGrid();
        });
      });

      let searchTimeout;
      document.getElementById('exploreSearch').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => { searchTerm = e.target.value.toLowerCase(); applyFilter(); renderGrid(); }, 300);
      });

      document.getElementById('feedBack').addEventListener('click', closeFeed);
      document.getElementById('feedClose').addEventListener('click', closeFeed);
      document.getElementById('feedChatSend').addEventListener('click', sendFeedChatMessage);
      document.getElementById('saveSearchBtn').addEventListener('click', saveCurrentSearch);
      document.getElementById('conditionFilter').addEventListener('change', (e) => {
        conditionFilter = e.target.value;
        applyFilter();
        renderGrid();
      });
      document.addEventListener('keydown', handleFeedKey);
      window.addEventListener('popstate', e => { if (feedOpen && !e.state?.feed) closeFeed(); });
    });

    function applyFilter() {
      const blockedUsers = JSON.parse(localStorage.getItem('gavel_blocked_users') || '[]');
      let items = allAuctions.filter(a => a.status === 'active' && !blockedUsers.includes(a.sellerEmail));
      if (searchTerm) items = items.filter(a => a.title.toLowerCase().includes(searchTerm) || (a.category || '').toLowerCase().includes(searchTerm));
      if (conditionFilter) items = items.filter(a => (a.condition || '').toLowerCase() === conditionFilter.toLowerCase());
      switch (currentFilter) {
        case 'videos': items = items.filter(a => a.video); break;
        case 'live': items = items.filter(a => a.endTime && new Date(a.endTime) > new Date()); break;
        case 'ending': items = items.filter(a => a.endTime && new Date(a.endTime) > new Date()).sort((a, b) => new Date(a.endTime) - new Date(b.endTime)); break;
        case 'highbids': items = items.sort((a, b) => (b.currentBid || 0) - (a.currentBid || 0)); break;
        default: items.sort((a, b) => { if (a.video && !b.video) return -1; if (!a.video && b.video) return 1; return 0; });
      }
      filtered = items;
    }

    function renderGrid() {
      const grid = document.getElementById('exploreGrid');
      if (!filtered.length) {
        grid.innerHTML = '<div class="feed-empty" style="grid-column:1/-1;"><h3>No auctions found</h3><p style="color:var(--text-muted);"><a href="auction.html">Browse auctions</a></p></div>';
        return;
      }

      grid.innerHTML = filtered.map((a, i) => {
        const img = (a.images || [])[0] || '';
        const hasVideo = !!a.video;
        const isUrgent = UI.isUrgent(a.endTime);
        const isWatched = watchlistIds.has(a.id);
        const statusBadge = isUrgent
          ? '<span class="vo-badge vo-badge-ending">Ending Soon</span>'
          : (a.endTime && new Date(a.endTime) > new Date()) ? '<span class="vo-badge vo-badge-live">Live</span>' : '';

        let mediaHTML;
        if (hasVideo) {
          mediaHTML = `<video src="${a.video}" loop muted playsinline preload="metadata" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"></video>
            <div class="gradient-placeholder" style="display:none;">${(a.title || '').slice(0, 30)}</div>`;
        } else {
          mediaHTML = img
            ? `<img src="${img}" alt="${a.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="gradient-placeholder" style="display:none;">${(a.title || '').slice(0, 30)}</div>`
            : `<div class="gradient-placeholder">${(a.title || '').slice(0, 30)}</div>`;
        }

        return `
          <div class="explore-card" data-idx="${i}" data-id="${a.id}">
            <div class="explore-card-media">
              ${mediaHTML}
              <button class="card-watch-btn ${isWatched ? 'watched' : ''}" data-watch="${a.id}">
                <svg viewBox="0 0 24 24" fill="${isWatched ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              <div class="card-overlay">
                <div class="item-meta">${statusBadge}</div>
                <div class="item-title">${a.title}</div>
                <div class="item-price">${UI.formatPrice(a.currentBid)}</div>
                <div class="item-meta">
                  <span>${a.bidCount || 0} bids</span>
                  ${a.endTime ? `<span class="timer-pill ${isUrgent ? 'urgent' : ''}" data-countdown="${a.endTime}">${UI.formatTime(a.endTime)}</span>` : ''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      bindGridEvents();
      startCountdowns();
      setupAutoplay();
    }

    function bindGridEvents() {
      document.querySelectorAll('.explore-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-watch-btn') || e.target.closest('.card-mute-btn')) return;
          openFeed(Number(card.dataset.idx));
        });
      });
      document.querySelectorAll('.card-watch-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleWatchlistBtn(btn);
        });
      });
    }

    async function toggleWatchlistBtn(btn) {
      const id = btn.dataset.watch;
      const isWatched = btn.classList.contains('watched');
      if (Auth.isLoggedIn()) {
        const res = await api.post('/watchlist/toggle', { auctionId: id });
        if (res?.success) {
          if (res.added) { btn.classList.add('watched'); btn.querySelector('svg').setAttribute('fill', 'currentColor'); watchlistIds.add(id); UI.toast('Added to watchlist', 'success'); }
          else { btn.classList.remove('watched'); btn.querySelector('svg').setAttribute('fill', 'none'); watchlistIds.remove(id); UI.toast('Removed from watchlist', 'info'); }
        }
      } else {
        if (isWatched) { btn.classList.remove('watched'); btn.querySelector('svg').setAttribute('fill', 'none'); watchlistIds.remove(id); }
        else { btn.classList.add('watched'); btn.querySelector('svg').setAttribute('fill', 'currentColor'); watchlistIds.add(id); UI.toast('Added to watchlist', 'success'); }
      }
    }

    function setupAutoplay() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('video');
          if (!video) return;
          if (entry.isIntersecting && entry.intersectionRatio > 0.5) video.play().catch(() => {});
          else video.pause();
        });
      }, { threshold: 0.5 });
      document.querySelectorAll('.explore-card').forEach(card => observer.observe(card));
    }

    let countdownInterval = null;
    function startCountdowns() {
      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        document.querySelectorAll('[data-countdown]').forEach(el => {
          const endTime = el.dataset.countdown;
          const diff = new Date(endTime).getTime() - Date.now();
          if (diff <= 0) { el.textContent = 'Ended'; el.classList.remove('urgent'); return; }
          el.textContent = UI.formatTime(endTime);
          el.classList.toggle('urgent', diff < 3600000);
        });
      }, 1000);
    }

    // ── INFINITE SCROLL FEED ──
    function openFeed(index) {
      feedIndex = index;
      feedOpen = true;
      savedScrollY = window.scrollY;
      const feed = document.getElementById('scrollFeed');
      feed.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderFeedItem();
      connectWS(filtered[feedIndex]?.id);
      history.pushState({ feed: true }, '', `/explore.html?item=${filtered[feedIndex]?.id}`);

      const track = document.getElementById('feedTrack');
      track.addEventListener('touchstart', onTouchStart, { passive: true });
      track.addEventListener('touchend', onTouchEnd, { passive: true });
      track.addEventListener('wheel', onFeedWheel, { passive: false });
    }

    function closeFeed() {
      feedOpen = false;
      disconnectWS();
      document.getElementById('scrollFeed').classList.remove('open');
      document.getElementById('feedChatPanel').classList.remove('open');
      document.body.style.overflow = '';
      window.scrollTo(0, savedScrollY);
      history.pushState({}, '', '/explore.html');
    }

    function renderFeedItem() {
      const a = filtered[feedIndex];
      if (!a) return;
      const track = document.getElementById('feedTrack');
      const img = (a.images || [])[0] || '';
      const hasVideo = !!a.video;
      const isUrgent = UI.isUrgent(a.endTime);
      const isWatched = watchlistIds.has(a.id);
      const specs = Object.entries(a.specifications || {})
        .map(([key, value]) => `<tr><td>${key}</td><td>${value}</td></tr>`)
        .join('');

      let mediaHTML;
      if (hasVideo) {
        mediaHTML = `<div class="sfi-media-frame"><video src="${a.video}" loop muted playsinline onerror="this.style.display='none';this.parentElement.nextElementSibling.style.display='flex';"></video></div>
          <div class="gradient-placeholder" style="display:none;">${(a.title || '').slice(0, 30)}</div>`;
      } else {
        mediaHTML = img
          ? `<div class="sfi-media-frame"><img src="${img}" alt="${a.title}" onerror="this.style.display='none';this.parentElement.nextElementSibling.style.display='flex';"></div><div class="gradient-placeholder" style="display:none;">${(a.title || '').slice(0, 30)}</div>`
          : `<div class="gradient-placeholder">${(a.title || '').slice(0, 30)}</div>`;
      }

      const statusBadge = isUrgent ? '<span class="vo-badge vo-badge-ending">Ending Soon</span>' :
        (a.endTime && new Date(a.endTime) > new Date()) ? '<span class="vo-badge vo-badge-live">Live</span>' : '';

      track.innerHTML = `
        <div class="scroll-feed-item current" id="feedItem">
          <div class="sfi-media">
            ${mediaHTML}
            <div class="sfi-info">
              <div class="sfi-meta">${statusBadge} <span style="opacity:0.7;">${a.category || ''}</span></div>
              <div class="sfi-title">${a.title}</div>
              <div class="sfi-price">${UI.formatPrice(a.currentBid)}</div>
              <div class="sfi-meta">
                <span>${a.bidCount || 0} bids</span>
                ${a.endTime ? `<span class="timer-pill ${isUrgent ? 'urgent' : ''}" data-countdown="${a.endTime}">${UI.formatTime(a.endTime)}</span>` : ''}
              </div>
            </div>
            <div class="sfi-side">
              <button class="sfi-side-btn" id="feedWatchBtn" data-id="${a.id}">
                <svg viewBox="0 0 24 24" fill="${isWatched ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span class="sfi-side-label">${isWatched ? 'Saved' : 'Save'}</span>
              </button>
              <button type="button" class="sfi-side-btn" id="feedChatBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="sfi-side-label">Chat</span>
              </button>
              <a href="item-detail.html?id=${a.id}" class="sfi-side-btn" onclick="event.stopPropagation();">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                <span class="sfi-side-label">Open</span>
              </a>
            </div>
          </div>
          <aside class="sfi-panel">
            <p class="text-muted text-sm" style="margin-bottom:var(--space-2);">Product details</p>
            <h3 style="font-size:var(--text-3xl);">${a.title}</h3>
            <p style="font-size:var(--text-2xl);color:var(--gold-light);margin-top:var(--space-2);">${UI.formatPrice(a.currentBid)}</p>
            <p style="margin-top:var(--space-4);color:rgba(255,255,255,0.76);line-height:1.8;">${a.description || 'Seller has not added a description yet.'}</p>
            ${specs ? `<table class="sfi-specs">${specs}</table>` : '<p class="text-muted text-sm" style="margin-top:var(--space-4);">No specs added yet.</p>'}
            <div style="margin-top:var(--space-5);display:grid;gap:var(--space-3);">
              <div class="tag">Seller: ${a.sellerName || 'Unknown'}</div>
              <div class="tag">Trust score: ${a.sellerTrustScore || 0}</div>
              <div class="tag">Views: ${a.viewCount || 0}</div>
            </div>
          </aside>
        </div>`;

      document.getElementById('feedCounter').textContent = `${feedIndex + 1} / ${filtered.length}`;

      const video = track.querySelector('video');
      if (video) { video.muted = true; video.defaultMuted = true; video.play().catch(() => {}); }

      document.getElementById('feedWatchBtn')?.addEventListener('click', async () => {
        const btn = document.getElementById('feedWatchBtn');
        const id = btn.dataset.id;
        const wasWatched = watchlistIds.has(id);
        if (Auth.isLoggedIn()) {
          const res = await api.post('/watchlist/toggle', { auctionId: id });
          if (res?.success) {
            if (res.added) { watchlistIds.add(id); UI.toast('Added to watchlist', 'success'); }
            else { watchlistIds.remove(id); UI.toast('Removed from watchlist', 'info'); }
          }
        } else {
          if (wasWatched) watchlistIds.remove(id); else { watchlistIds.add(id); UI.toast('Added to watchlist', 'success'); }
        }
        const nowWatched = watchlistIds.has(id);
        btn.querySelector('svg').setAttribute('fill', nowWatched ? 'currentColor' : 'none');
        btn.querySelector('.sfi-side-label').textContent = nowWatched ? 'Saved' : 'Save';
      });

      document.getElementById('feedChatBtn')?.addEventListener('click', () => openFeedChat(a));

      startCountdowns();
    }

    function goToFeedItem(newIndex) {
      if (newIndex < 0 || newIndex >= filtered.length) return;
      const direction = newIndex > feedIndex ? 1 : -1;
      feedIndex = newIndex;

      const item = document.getElementById('feedItem');
      if (item) {
        item.style.transition = 'transform 280ms ease-out, opacity 280ms ease-out';
        item.style.transform = direction > 0 ? 'translateY(-100%)' : 'translateY(100%)';
        item.style.opacity = '0';
      }

      setTimeout(() => {
        disconnectWS();
        renderFeedItem();
        connectWS(filtered[feedIndex]?.id);
        history.replaceState({ feed: true }, '', `/explore.html?item=${filtered[feedIndex]?.id}`);
      }, 280);
    }

    function handleFeedKey(e) {
      if (!feedOpen) return;
      if (e.key === 'Escape') closeFeed();
      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); goToFeedItem(feedIndex - 1); }
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); goToFeedItem(feedIndex + 1); }
    }

    function onTouchStart(e) { touchStartY = e.touches[0].clientY; touchStartTime = Date.now(); }
    function onTouchEnd(e) {
      const deltaY = touchStartY - e.changedTouches[0].clientY;
      const elapsed = Date.now() - touchStartTime;
      const velocity = Math.abs(deltaY) / elapsed;
      const threshold = velocity > 0.5 ? 30 : 60;
      if (Math.abs(deltaY) > threshold) {
        if (deltaY > 0) goToFeedItem(feedIndex + 1);
        else goToFeedItem(feedIndex - 1);
      }
    }

    function onFeedWheel(e) {
      if (!feedOpen) return;
      e.preventDefault();
      if (wheelLocked) return;
      const delta = e.deltaY;
      if (Math.abs(delta) < 24) return;
      wheelLocked = true;
      if (delta > 0) goToFeedItem(feedIndex + 1);
      else goToFeedItem(feedIndex - 1);
      setTimeout(() => { wheelLocked = false; }, 320);
    }

    async function openFeedChat(auction) {
      if (!Auth.isLoggedIn()) {
        UI.toast('Log in to message sellers.', 'error');
        return;
      }
      const panel = document.getElementById('feedChatPanel');
      panel.classList.add('open');
      document.getElementById('feedChatProduct').textContent = auction.title;
      document.getElementById('feedChatWith').textContent = auction.sellerName || 'Seller';
      activeChatAuctionId = auction.id;
      activeChatOtherEmail = auction.sellerEmail;

      const res = await api.get(`/chat/${auction.id}?with=${encodeURIComponent(auction.sellerEmail)}`);
      const body = document.getElementById('feedChatBody');
      if (!res || res.message) {
        body.innerHTML = '<div class="feed-chat-bubble theirs">Unable to load this conversation right now.</div>';
        return;
      }
      activeConversationKey = res.conversationKey;
      body.innerHTML = (res.messages || []).map(msg => {
        const cls = msg.senderEmail === myEmail ? 'mine' : 'theirs';
        return `<div class="feed-chat-bubble ${cls}">${msg.message}</div>`;
      }).join('') || '<div class="feed-chat-bubble theirs">Start the conversation with the seller.</div>';
      body.scrollTop = body.scrollHeight;
    }

    async function sendFeedChatMessage() {
      if (!activeChatAuctionId || !activeChatOtherEmail) return;
      const input = document.getElementById('feedChatInput');
      const text = input.value.trim();
      if (!text) return;
      const res = await api.post(`/chat/${activeChatAuctionId}`, { message: text, recipientEmail: activeChatOtherEmail });
      if (!res?.success) {
        UI.toast(res?.message || 'Failed to send message', 'error');
        return;
      }
      const body = document.getElementById('feedChatBody');
      body.insertAdjacentHTML('beforeend', `<div class="feed-chat-bubble mine">${text}</div>`);
      body.scrollTop = body.scrollHeight;
      input.value = '';
    }

    async function saveCurrentSearch() {
      if (!Auth.isLoggedIn()) {
        UI.toast('Log in to save searches.', 'error');
        return;
      }
      const payload = {
        query: document.getElementById('exploreSearch').value.trim(),
        category: currentFilter === 'all' ? '' : currentFilter,
        condition: conditionFilter,
        notify: true
      };
      const res = await api.post('/saved-searches', payload);
      if (res?.success) UI.toast('Saved search created. You will be notified for matches.', 'success');
      else UI.toast('Could not save search.', 'error');
    }

    // ── WEBSOCKET ──
    function connectWS(auctionId) {
      disconnectWS();
      if (!auctionId) return;
      const token = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('jwt_token='))?.split('=')[1] || '';
      const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${window.location.host}/ws?auctionId=${auctionId}&token=${token}`);
      ws.onopen = () => {
        try {
          ws.send(JSON.stringify({ type: 'watch', itemId: String(auctionId) }));
          if (activeConversationKey) {
            ws.send(JSON.stringify({ type: 'join_chat', conversationKey: activeConversationKey, email: myEmail }));
          }
        } catch {}
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'bid_update') {
            const priceEl = document.querySelector('.sfi-price');
            if (priceEl) { priceEl.textContent = UI.formatPrice(msg.newBid); priceEl.style.animation = 'bidPulse 0.4s ease'; setTimeout(() => priceEl.style.animation = '', 500); }
          }
          if (msg.type === 'auction_closed') {
            UI.toast('Auction has ended!', 'info');
          }
          if (msg.type === 'chat_msg' && msg.conversationKey === activeConversationKey && msg.senderEmail !== myEmail) {
            const body = document.getElementById('feedChatBody');
            body.insertAdjacentHTML('beforeend', `<div class="feed-chat-bubble theirs">${msg.message}</div>`);
            body.scrollTop = body.scrollHeight;
          }
        } catch {}
      };
    }
    function disconnectWS() { if (ws) { ws.close(); ws = null; } }
  </script>
</body>
</html>
