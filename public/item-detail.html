<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auction Detail — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
  <style>
    /* Fix: remove dark gradient overlay on the bid panel card */
    .detail-bid-card > div:first-child::after { display: none !important; }
    .detail-bid-card { overflow: visible !important; }
    .detail-bid-card:hover { transform: none !important; box-shadow: var(--shadow-sm) !important; }
    @media (max-width:1023px) { .detail-grid { grid-template-columns: 1fr !important; } }
  </style>
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html">Live Auctions</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-ghost btn-sm" id="loginBtn">Log in</a>
      <a href="signup.html" class="btn btn-primary btn-sm" id="signupBtn">Get Started</a>
      <a href="chats.html" class="btn btn-ghost btn-sm hide" id="messagesBtn">Messages</a>
      <a href="my-products.html" class="btn btn-ghost btn-sm hide" id="myListingsBtn">My Listings</a>
      <a href="dashboard-home.html" class="btn btn-primary btn-sm hide" id="dashboardBtn">Dashboard</a>
    </div>
  </div></nav>

  <section style="padding:var(--space-8) 0; background:var(--bg);">
    <div class="container">
      <div id="detailContent" class="flex-center" style="min-height:400px;"><div class="spinner"></div></div>
    </div>
  </section>

  <footer style="border-top:1px solid var(--border-light);padding:var(--space-8) 0;background:var(--bg);margin-top:var(--space-12);">
    <div class="container flex-between" style="gap:var(--space-4);"><a href="/" class="navbar-brand">Gavel<span>.</span></a><p class="text-muted text-sm">&copy; 2026 Gavel</p></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let auction = null;
    let ws = null;
    let countdownInterval = null;

    function trackRecentlyViewed(auction) {
        const key = 'gavel_recently_viewed';
        const maxItems = 10;
        let items = JSON.parse(localStorage.getItem(key) || '[]');
        items = items.filter(item => item.id !== auction._id);
        items.unshift({ id: auction._id, name: auction.title, image: auction.images?.[0] || '', bid: auction.currentBid || 0 });
        if (items.length > maxItems) items = items.slice(0, maxItems);
        localStorage.setItem(key, JSON.stringify(items));
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 20));

      const user = Auth.getUser();
      if (user) {
        document.getElementById('loginBtn')?.classList.add('hide');
        document.getElementById('signupBtn')?.classList.add('hide');
        document.getElementById('messagesBtn')?.classList.remove('hide');
        document.getElementById('myListingsBtn')?.classList.remove('hide');
        document.getElementById('dashboardBtn')?.classList.remove('hide');
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = '/auction.html'; return; }

      const data = await api.get('/auction/' + id);
      if (!data || data.message) { document.getElementById('detailContent').innerHTML = '<div class="empty-state"><h3>Auction not found</h3><p><a href="auction.html">Browse auctions</a></p></div>'; return; }
      auction = data;
      trackRecentlyViewed(auction);
      renderDetail();
      connectWS(id);
    });

    function renderClosedBlock(a) {
      const u = Auth.getUser();
      const winnerLine = a.winnerName
        ? `<p class="text-sm" style="margin-top:var(--space-2);">Won by ${a.winnerName} at ${UI.formatPrice(a.winningBid)}</p>`
        : '<p class="text-muted text-sm" style="margin-top:var(--space-2);">No bids placed</p>';

      let chatBtn = '';
      if (u && a.winnerEmail && (u.email === a.sellerEmail || u.email === a.winnerEmail)) {
        const withEmail = u.email === a.sellerEmail ? a.winnerEmail : a.sellerEmail;
        const label = u.email === a.sellerEmail ? 'Message Buyer' : 'Message Seller';
        chatBtn = `<a href="/chat.html?auction=${a.id}&with=${withEmail}" class="btn btn-primary btn-sm" style="margin-top:var(--space-3);width:100%;display:block;">${label}</a>`;
      }

      return `<div style="background:var(--sand);border-radius:var(--radius-lg);padding:var(--space-4);text-align:center;"><p style="font-weight:600;">Auction Ended</p>${winnerLine}${chatBtn}</div>`;
    }

    function renderDetail() {
      const a = auction;
      const u = Auth.getUser();
      const isSeller = u && u.email === a.sellerEmail;
      const imgs = a.images || [];
      const mainImg = imgs[0] || '';
      const fallback = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450" fill="%23ebe4d6"><rect width="600" height="450"/><text x="50%" y="50%" text-anchor="middle" fill="%238b7355" font-family="Georgia" font-size="20">No Image</text></svg>');
      const isUrgent = UI.isUrgent(a.endTime);
      const timerClass = isUrgent ? 'timer timer-urgent' : 'timer';
      const minBid = (a.currentBid || 0) + (a.increment || 500);

      document.getElementById('detailContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 400px;gap:var(--space-8);align-items:start;" class="detail-grid">
          <div>
            <div style="border-radius:var(--radius-2xl);overflow:hidden;background:var(--sand);margin-bottom:var(--space-4);position:relative;">
              ${mainImg ? `<img id="mainImage" src="${mainImg}" alt="${a.title}" style="width:100%;aspect-ratio:4/3;object-fit:cover;" onerror="this.onerror=null;this.src='${fallback}';">` : '<div style="width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:var(--earth);">No Image</div>'}
              ${a.hasRivalry ? '<span class="badge badge-rivalry" style="position:absolute;top:1rem;right:1rem;">Campus Rivalry</span>' : ''}
              ${a.status === 'active' ? '<span class="badge badge-live" style="position:absolute;top:1rem;left:1rem;">Live</span>' : ''}
            </div>
            ${imgs.length > 1 ? `<div style="display:flex;gap:var(--space-2);overflow-x:auto;">${imgs.map((im, i) => `<img src="${im}" style="width:80px;height:60px;object-fit:cover;border-radius:var(--radius-md);cursor:pointer;border:2px solid ${i === 0 ? 'var(--olive)' : 'transparent'};" onclick="document.getElementById('mainImage').src='${im}';this.parentElement.querySelectorAll('img').forEach(x=>x.style.borderColor='transparent');this.style.borderColor='var(--olive)';" onerror="this.style.display='none'">`).join('')}</div>` : ''}
            ${a.video ? `<div style="margin-top:var(--space-4);"><video controls style="width:100%;border-radius:var(--radius-lg);background:#000;"><source src="${a.video}" type="video/mp4">Your browser does not support video.</video></div>` : ''}
            <div style="margin-top:var(--space-6);">
              <h2 style="font-size:var(--text-2xl);margin-bottom:var(--space-3);">Description</h2>
              <p style="color:var(--text-secondary);line-height:1.8;white-space:pre-wrap;">${a.description || 'No description provided.'}</p>
            </div>
            <div style="margin-top:var(--space-6);">
              <h3 style="font-size:var(--text-lg);margin-bottom:var(--space-4);">Bid History</h3>
              <div id="bidHistory" style="padding:var(--space-4);"><div class="spinner"></div></div>
            </div>
          </div>

          <div style="position:sticky;top:5rem;">
            <div class="card detail-bid-card" style="border-radius:var(--radius-2xl);">
              <div class="card-body" style="padding:var(--space-6);">
                <h1 style="font-size:var(--text-2xl);margin-bottom:var(--space-3);">${a.title}</h1>
                <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;">
                  <span class="tag">${a.category || 'General'}</span>
                  ${a.bidCount ? `<span class="text-muted text-sm">${a.bidCount} bid${a.bidCount !== 1 ? 's' : ''}</span>` : ''}
                </div>

                <div style="background:var(--cream);border-radius:var(--radius-lg);padding:var(--space-5);margin-bottom:var(--space-5);">
                  <p class="text-muted text-sm" style="margin-bottom:var(--space-1);">Current Bid</p>
                  <p class="price" style="font-size:var(--text-4xl);" id="currentBidDisplay">${UI.formatPrice(a.currentBid)}</p>
                  ${a.endTime ? `<div style="margin-top:var(--space-3);"><span class="${timerClass}" id="timerDisplay" data-countdown="${a.endTime}">${UI.formatTime(a.endTime)}</span></div>` : ''}
                </div>

                <div class="flex-between" style="margin-bottom:var(--space-3);font-size:var(--text-xs);color:var(--text-muted);">
                  <span>Min bid: ${UI.formatPrice(minBid)}</span>
                  <span>Increment: ${UI.formatPrice(a.increment || 500)}</span>
                </div>

                ${a.status === 'active' ? `
                <div id="bidForm">
                  ${isSeller ? `
                  <div style="background:var(--sand);border-radius:var(--radius-lg);padding:var(--space-3);text-align:center;margin-bottom:var(--space-3);">
                    <p class="text-sm text-muted">This is your listing</p>
                  </div>
                  <button class="btn btn-danger btn-sm" style="width:100%;" onclick="endAuctionEarly()">End Auction Early</button>
                  ` : `
                  <div class="form-group">
                    <label class="form-label">Your Bid</label>
                    <input class="form-input" type="number" id="bidAmount" min="${minBid}" step="${a.increment || 500}" placeholder="${minBid}" value="${minBid}">
                  </div>
                  <button class="btn btn-primary btn-lg" style="width:100%;" onclick="placeBid()">Place Bid</button>
                  <div style="margin-top:var(--space-4);border-top:1px solid var(--border-light);padding-top:var(--space-4);">
                    <p class="text-sm" style="font-weight:600;margin-bottom:var(--space-2);">Auto-Bid</p>
                    <div class="form-group" style="margin-bottom:var(--space-3);">
                      <input class="form-input" type="number" id="autoBidMax" placeholder="Max amount" min="${minBid}">
                    </div>
                    <button class="btn btn-secondary btn-sm" style="width:100%;" onclick="setAutoBid()">Set Auto-Bid</button>
                  </div>
                  `}
                </div>
                ` : a.status === 'closed' ? renderClosedBlock(a) : `<div style="background:var(--sand);border-radius:var(--radius-lg);padding:var(--space-4);text-align:center;"><p style="font-weight:600;">${a.status === 'pending_review' ? 'Pending Review' : a.status === 'under_review' ? 'Under Review' : a.status === 'rejected' ? 'Rejected' : a.status}</p></div>`}

                <div style="margin-top:var(--space-4);display:flex;gap:var(--space-2);">
                  <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="toggleWatchlist()" id="watchlistBtn">♡ Watchlist</button>
                </div>

                <div style="margin-top:var(--space-4);padding-top:var(--space-4);border-top:1px solid var(--border-light);">
                  <p class="text-sm" style="margin-bottom:var(--space-1);"><strong>Seller:</strong> ${a.sellerName || 'Unknown'}</p>
                  ${a.sellerCollege ? `<p class="text-muted text-sm">${a.sellerCollege}${a.sellerCampusVerified ? ' ✓' : ''}</p>` : ''}
                  <div class="trust-score" style="margin-top:var(--space-1);"><span class="trust-dot"></span> Trust: ${a.sellerTrustScore || 50}</div>
                </div>
              </div>
            </div>
          </div>
        </div>`;

      if (a.endTime) {
        countdownInterval = setInterval(() => {
          const el = document.getElementById('timerDisplay');
          if (el) { el.textContent = UI.formatTime(a.endTime); el.className = UI.isUrgent(a.endTime) ? 'timer timer-urgent' : 'timer'; }
        }, 1000);
      }

      loadBidHistory(a.id);
    }

    async function endAuctionEarly() {
      if (!confirm('End this auction now? This cannot be undone.')) return;
      const res = await api.post('/auctions/end-auction', { id: auction.id });
      if (res?.success) { UI.toast('Auction ended.', 'success'); setTimeout(() => location.reload(), 1500); }
      else UI.toast(res?.message || 'Failed to end auction', 'error');
    }

    async function loadBidHistory(auctionId) {
      const bids = await api.get('/bids/' + auctionId);
      const el = document.getElementById('bidHistory');
      if (!bids || !bids.bids || !bids.bids.length) { el.innerHTML = '<p class="text-muted text-sm">No bids yet.</p>'; return; }
      el.innerHTML = `<div style="display:flex;flex-direction:column;gap:var(--space-2);">${bids.bids.map(b => `
        <div class="flex-between" style="padding:var(--space-2) var(--space-3);background:var(--cream);border-radius:var(--radius-md);">
          <span class="text-sm" style="font-weight:500;">${b.bidderName}</span>
          <span class="price price-small">${UI.formatPrice(b.amount)}</span>
        </div>`).join('')}</div>`;
    }

    async function placeBid() {
      const user = Auth.getUser();
      if (!user) { UI.toast('Please log in to bid', 'error'); window.location.href = '/login.html'; return; }
      const amount = Number(document.getElementById('bidAmount').value);
      if (!amount) { UI.toast('Enter a bid amount', 'error'); return; }
      const res = await api.post('/bids/' + auction.id, { bidAmount: amount });
      if (res?.success) {
        UI.toast(res.message || 'Bid placed!', 'success');
        auction.currentBid = res.newBid;
        auction.bidCount = res.bidCount;
        document.getElementById('currentBidDisplay').textContent = UI.formatPrice(res.newBid);
        const minBid = res.newBid + (auction.increment || 500);
        document.getElementById('bidAmount').value = minBid;
        document.getElementById('bidAmount').min = minBid;
        loadBidHistory(auction.id);
      } else {
        UI.toast(res?.message || 'Bid failed', 'error');
      }
    }

    async function setAutoBid() {
      const user = Auth.getUser();
      if (!user) { UI.toast('Please log in', 'error'); return; }
      const maxAmount = Number(document.getElementById('autoBidMax').value);
      if (!maxAmount) { UI.toast('Enter max amount', 'error'); return; }
      const res = await api.post('/bids/auto-bid', { listingId: auction.id, maxAmount });
      if (res?.success) { UI.toast(res.message, 'success'); } else { UI.toast(res?.message || 'Auto-bid failed', 'error'); }
    }

    async function toggleWatchlist() {
      const user = Auth.getUser();
      if (!user) { UI.toast('Please log in', 'error'); return; }
      const res = await api.post('/watchlist/toggle', { auctionId: auction.id });
      if (res?.success) {
        const btn = document.getElementById('watchlistBtn');
        btn.textContent = res.added ? '♥ Watching' : '♡ Watchlist';
        UI.toast(res.added ? 'Added to watchlist' : 'Removed from watchlist', 'info');
      }
    }

    function connectWS(auctionId) {
      const token = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('jwt_token='))?.split('=')[1] || '';
      const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${window.location.host}/ws?auctionId=${auctionId}&token=${token}`);
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'bid_update' && auction) {
            auction.currentBid = msg.newBid;
            auction.bidCount = msg.bidCount;
            const el = document.getElementById('currentBidDisplay');
            if (el) { el.textContent = UI.formatPrice(msg.newBid); el.classList.add('animate-bid'); setTimeout(() => el.classList.remove('animate-bid'), 500); }
            const minBid = msg.newBid + (auction.increment || 500);
            const input = document.getElementById('bidAmount');
            if (input) { input.value = minBid; input.min = minBid; }
            loadBidHistory(auction.id);
          }
          if (msg.type === 'auction_closed') {
            UI.toast('Auction has ended!', 'info');
            setTimeout(() => location.reload(), 2000);
          }
          if (msg.type === 'snipe:extended') {
            UI.toast('Anti-snipe: time extended by 3 min!', 'info');
            if (auction) auction.endTime = msg.newEndTime;
          }
        } catch (e) {}
      };
    }
  </script>
</body>
</html>
