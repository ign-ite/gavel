<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="images/logo.png">
  <style>
    .chats-hero {
      padding: var(--space-20) 0 var(--space-6);
      background: linear-gradient(180deg, var(--cream) 0%, var(--parchment) 100%);
    }

    .chat-row {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4); border-radius: var(--radius-lg);
      background: var(--bg-raised); border: 1px solid var(--border-light);
      text-decoration: none; color: inherit; transition: all var(--transition);
      margin-bottom: var(--space-3);
    }
    .chat-row:hover { box-shadow: var(--shadow-md); transform: translateX(4px); }
    .chat-row.has-unread { border-left: 3px solid var(--olive); background: rgba(143,170,126,0.04); }

    .chat-thumb { width: 56px; height: 56px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; background: var(--sand); }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: var(--olive); color: var(--parchment);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: var(--text-sm); flex-shrink: 0;
    }
    .chat-body { flex: 1; min-width: 0; }
    .chat-body .chat-title { font-weight: 600; font-size: var(--text-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .chat-body .chat-with { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: 4px; }
    .chat-body .chat-preview { font-size: var(--text-sm); color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-body .chat-preview.unread-preview { color: var(--text-primary); font-weight: 600; }
    .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-2); flex-shrink: 0; }
    .chat-time { font-size: var(--text-xs); color: var(--text-muted); }
    .unread-badge {
      background: var(--olive); color: var(--parchment);
      font-size: var(--text-xs); font-weight: 700;
      border-radius: var(--radius-full); padding: 2px 8px; min-width: 22px; text-align: center;
    }
  </style>
</head>
<body style="padding-top:var(--space-20);">
  <nav class="navbar" id="navbar"><div class="container">
    <a href="/" class="navbar-brand">Gavel<span>.</span></a>
    <ul class="navbar-nav">
      <li><a href="auction.html">Live Auctions</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="sell-product.html">Sell</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="dashboard.html" class="btn btn-primary btn-sm" id="dashboardBtn">Dashboard</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" onclick="Auth.logout()" style="display:none;">Log out</button>
    </div>
  </div></nav>

  <section class="chats-hero">
    <div class="container" style="max-width:800px;">
      <h1 style="font-size:var(--text-3xl);">Messages</h1>
      <p style="color:var(--text-secondary);margin-top:var(--space-2);">Your product conversations</p>
    </div>
  </section>

  <section style="padding:var(--space-4) 0 var(--space-16);">
    <div class="container" style="max-width:800px;">
      <div id="chatsList"><div class="flex-center" style="padding:2rem;"><div class="spinner"></div></div></div>
    </div>
  </section>

  <footer style="border-top:1px solid var(--border-light);padding:var(--space-8) 0;background:var(--bg);">
    <div class="container flex-between" style="gap:var(--space-4);"><a href="/" class="navbar-brand">Gavel<span>.</span></a><p class="text-muted text-sm">&copy; 2026 Gavel</p></div>
  </footer>
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      window.addEventListener('scroll', () => document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 20));

      const chats = await api.get('/chat/my-chats/list');
      if (!chats || chats.error) { UI.toast('Failed to load messages', 'error'); return; }
      renderChats(chats);
    });

    function renderChats(chats) {
      const el = document.getElementById('chatsList');
      if (!chats.length) {
        el.innerHTML = `<div class="empty-state"><h3>No messages yet</h3><p>Your product conversations will appear here after winning or selling.</p></div>`;
        return;
      }

      el.innerHTML = chats.map(c => {
        const hasUnread = c.unreadCount > 0;
        const preview = c.lastMessage ? c.lastMessage.slice(0, 60) + (c.lastMessage.length > 60 ? '…' : '') : 'No messages yet';
        const timeLabel = c.lastMessageAt ? formatRelativeTime(c.lastMessageAt) : '';
        const fallbackImg = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="%23ebe4d6"><rect width="56" height="56"/></svg>');

        return `<a href="chat.html?auction=${c.auctionId}&with=${encodeURIComponent(c.otherEmail)}" class="chat-row ${hasUnread ? 'has-unread' : ''}">
          ${c.image ? `<img class="chat-thumb" src="${c.image}" alt="${esc(c.auctionTitle)}" onerror="this.src='${fallbackImg}'">` : `<div class="chat-thumb"></div>`}
          <div class="chat-avatar">${(c.otherName || '?').charAt(0).toUpperCase()}</div>
          <div class="chat-body">
            <div class="chat-title">${esc(c.auctionTitle)}</div>
            <div class="chat-with"><strong>${esc(c.otherName)}</strong> <span class="badge ${c.role === 'seller' ? 'badge-closed' : 'badge-approved'}" style="font-size:0.65rem;">${c.role === 'seller' ? 'Seller' : 'Buyer'}</span></div>
            <div class="chat-preview ${hasUnread ? 'unread-preview' : ''}">${esc(preview)}</div>
          </div>
          <div class="chat-meta">
            ${timeLabel ? `<span class="chat-time">${timeLabel}</span>` : ''}
            ${hasUnread ? `<span class="unread-badge">${c.unreadCount > 99 ? '99+' : c.unreadCount}</span>` : ''}
          </div>
        </a>`;
      }).join('');
    }

    function formatRelativeTime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      const h = Math.floor(diff / 3600000);
      const d = Math.floor(diff / 86400000);
      if (m < 1) return 'Now';
      if (m < 60) return m + 'm ago';
      if (h < 24) return h + 'h ago';
      if (d < 7) return d + 'd ago';
      return new Date(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    }

    function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
