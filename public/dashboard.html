<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gavel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
        }

        body {
            background: var(--bg-main);
            display: flex;
            min-height: 100vh;
            color: var(--text-primary);
            margin: 0;
            font-family: var(--font-body) !important;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-deep);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 40px;
            text-decoration: none;
            font-family: var(--font-heading);
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
            padding: 0;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(140, 199, 196, 0.1);
            color: var(--accent-teal);
        }

        .nav-link.active {
            background: var(--accent-teal);
            color: var(--bg-deep);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px 50px;
            max-width: 1400px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-welcome h2 {
            font-size: 2rem;
            margin-bottom: 4px;
            font-family: var(--font-heading);
        }

        .user-welcome p {
            color: var(--text-secondary);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .stat-card h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-family: var(--font-heading);
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Section Tables */
        .content-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-table-container {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .dashboard-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .dashboard-table th {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-family: var(--font-heading);
        }

        .dashboard-table td {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .dashboard-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-active { background: rgba(121, 174, 111, 0.1); color: var(--accent-green); }
        .badge-won { background: rgba(140, 199, 196, 0.1); color: var(--accent-teal); }
        .badge-lost { background: rgba(174, 36, 72, 0.1); color: var(--accent-red); }

        .wallet-box {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-deep) 100%);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--accent-teal);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .wallet-info h3 { font-size: 0.9rem; color: var(--accent-teal); margin-bottom: 8px; font-family: var(--font-heading); }
        .wallet-info .balance { font-size: 2rem; font-weight: 800; }

        .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="sidebar-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Gavel</span>
        </a>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active" data-section="overview">Overview</a>
            </li>
            <li class="nav-item buyer-only" style="display:none;">
                <a href="#" class="nav-link" data-section="active-bids">Active Bids</a>
            </li>
            <li class="nav-item buyer-only" style="display:none;">
                <a href="#" class="nav-link" data-section="won-items">Items Won</a>
            </li>
            <li class="nav-item seller-only" style="display:none;">
                <a href="#" class="nav-link" data-section="my-listings">Live Listings</a>
            </li>
            <li class="nav-item admin-only" style="display:none;">
                <a href="#" class="nav-link" data-section="admin-analytics">Platform Analytics</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-section="watchlist">Watchlist</a>
            </li>
        </ul>

        <div style="margin-top:auto;">
            <a href="/logout" class="nav-link" style="color:var(--accent-red);">Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-bar">
            <div class="user-welcome">
                <h2 id="welcome-name">Hello, User</h2>
                <p id="user-role-badge">Verified Bidder</p>
            </div>
            <div class="header-actions">
                <a href="/auction.html" class="btn-primary btn-sm">Explore Auctions</a>
            </div>
        </div>

        <div class="wallet-box">
            <div class="wallet-info">
                <h3>Available Balance</h3>
                <div class="balance">₹<span id="wallet-balance">0.00</span></div>
            </div>
            <button class="btn-primary" onclick="addFundsMock()">Add Funds</button>
        </div>

        <!-- OVERVIEW SECTION -->
        <section id="section-overview" class="content-section active">
            <div class="stats-grid" id="dashboard-stats">
                <!-- Populated by JS -->
            </div>
            
            <h3 style="margin-bottom: 20px; font-family: var(--font-heading);">Recent Activity</h3>
            <div class="dashboard-table-container">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="recent-activity-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- OTHER SECTIONS POPULATED DYNAMICALLY -->
        <section id="section-active-bids" class="content-section">
            <h3 style="margin-bottom: 20px; font-family: var(--font-heading);">Your Active Bids</h3>
            <div class="dashboard-table-container" id="active-bids-container"></div>
        </section>

        <section id="section-my-listings" class="content-section">
            <h3 style="margin-bottom: 20px; font-family: var(--font-heading);">My Live Listings</h3>
            <div class="dashboard-table-container" id="my-listings-container"></div>
        </section>

        <section id="section-admin-analytics" class="content-section">
            <h3 style="margin-bottom: 20px; font-family: var(--font-heading);">Platform Health</h3>
            <div class="stats-grid" id="admin-stats-grid"></div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            setupNav();
        });

        async function loadProfile() {
            try {
                const res = await fetch('/api/profile');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();
                
                document.getElementById('welcome-name').textContent = `Hello, ${data.user.fullname}`;
                document.getElementById('wallet-balance').textContent = (data.user.walletBalance || 0).toLocaleString('en-IN');
                document.getElementById('user-role-badge').textContent = data.user.role.charAt(0).toUpperCase() + data.user.role.slice(1);

                renderRoleUI(data.user.role, data.stats);
                loadActivity();
            } catch (err) {
                console.error(err);
            }
        }

        function renderRoleUI(role, stats) {
            const statsContainer = document.getElementById('dashboard-stats');
            let statsHtml = '';

            if (role === 'bidder' || role === 'admin') {
                document.querySelectorAll('.buyer-only').forEach(el => el.style.display = 'block');
                statsHtml += `
                    <div class="stat-card"><h4>Active Bids</h4><div class="value">${stats.activeBids || 0}</div></div>
                    <div class="stat-card"><h4>Items Won</h4><div class="value">${stats.wins || 0}</div></div>
                    <div class="stat-card"><h4>Watchlist</h4><div class="value">${stats.watchlistCount || 0}</div></div>
                `;
            }

            if (role === 'seller' || role === 'admin') {
                document.querySelectorAll('.seller-only').forEach(el => el.style.display = 'block');
                statsHtml += `
                    <div class="stat-card"><h4>Live Listings</h4><div class="value">${stats.activeListings || 0}</div></div>
                    <div class="stat-card"><h4>Total Earnings</h4><div class="value">₹${(stats.totalEarnings || 0).toLocaleString('en-IN')}</div></div>
                    <div class="stat-card"><h4>Sold Items</h4><div class="value">${stats.soldCount || 0}</div></div>
                `;
            }

            if (role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                loadAdminStats();
            }

            statsContainer.innerHTML = statsHtml;
        }

        async function loadActivity() {
            const res = await fetch('/api/my-bids');
            const bids = await res.json();
            const body = document.getElementById('recent-activity-body');

            if (!bids.length) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No recent trades.</td></tr>';
                return;
            }

            body.innerHTML = bids.slice(0, 5).map(bid => `
                <tr>
                    <td><strong>${bid.auctionId?.title || 'Unknown Item'}</strong></td>
                    <td>₹${bid.amount.toLocaleString('en-IN')}</td>
                    <td><span class="badge badge-won">Competing</span></td>
                    <td>${new Date(bid.placedAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        async function loadAdminStats() {
            const res = await fetch('/api/admin/stats');
            const stats = await res.json();
            const grid = document.getElementById('admin-stats-grid');
            grid.innerHTML = `
                <div class="stat-card"><h4>Total Users</h4><div class="value">${stats.totalUsers}</div></div>
                <div class="stat-card"><h4>Daily Bids</h4><div class="value">${stats.totalBidsToday}</div></div>
                <div class="stat-card"><h4>Total Volume</h4><div class="value">₹${stats.totalVolume.toLocaleString('en-IN')}</div></div>
                <div class="stat-card"><h4>Flagged Items</h4><div class="value" style="color:var(--accent-red);">${stats.flaggedItems}</div></div>
            `;
        }

        function setupNav() {
            document.querySelectorAll('.nav-link[data-section]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = link.getAttribute('data-section');
                    
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');

                    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                    const target = document.getElementById(`section-${section}`);
                    if (target) target.classList.add('active');
                });
            });
        }

        async function addFundsMock() {
            await fetch('/api/deposit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: 100000 })
            });
            loadProfile();
        }
    </script>
</body>
</html>
