<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Won | Gavel</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar" id="navbar"><div class="container"><a href="/" class="navbar-brand">Gavel<span>.</span></a></div></nav>
  <main style="padding:calc(var(--space-20) + var(--space-8)) 0 var(--space-16);">
    <div class="container" style="max-width:820px;">
      <div class="card" style="padding:var(--space-8);border-radius:var(--radius-2xl);">
        <span class="badge badge-approved">Auction won</span>
        <h1 style="font-size:var(--text-5xl);margin-top:var(--space-4);">You won this auction</h1>
        <p id="winnerSummary" style="margin-top:var(--space-4);color:var(--text-secondary);">Loading winner details…</p>
        <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-6);">
          <a class="btn btn-primary" id="contactSellerBtn" href="#">Contact seller</a>
          <a class="btn btn-secondary" id="receiptBtn" href="#">View receipt</a>
          <a class="btn btn-ghost" id="itemBtn" href="#">Open item page</a>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/site.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      const id = new URLSearchParams(window.location.search).get('id');
      const item = await api.get('/auction/' + id);
      const receipt = await api.get('/receipt/' + id);
      if (!item || !receipt) return;
      document.getElementById('winnerSummary').textContent = `You won "${item.title}" at ₹${Number(receipt.finalPrice || 0).toLocaleString('en-IN')}. Message the seller now and schedule the campus handoff.`;
      document.getElementById('contactSellerBtn').href = `/chat.html?auction=${id}&with=${encodeURIComponent(item.sellerEmail || '')}&prefill=${encodeURIComponent(`Hi, I won ${item.title}. Can we schedule the handoff?`)}`;
      document.getElementById('receiptBtn').href = `/receipt.html?id=${id}`;
      document.getElementById('itemBtn').href = `/item-detail.html?id=${id}`;
    });
  </script>
</body>
</html>
